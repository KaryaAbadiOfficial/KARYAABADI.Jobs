}

  s.style.zoom=Math.min(1,ww/pw);

function handlePhoto(e){
  var file=e.target.files[0];
  if(!file)return;
  if(file.size>2*1024*1024){toast('Ukuran file maks 2MB','error');return}
  if(!file.type.startsWith('image/')){toast('File harus berupa gambar','error');return}
  var reader=new FileReader();
  reader.onload=function(ev){
    photoData=ev.target.result;
    var img=document.getElementById('photo-thumb');
    if(img){img.src=photoData;img.classList.remove('hidden')}

function downloadPDF(){
  saveStatic();
  var offscreen=document.getElementById('pdf-offscreen');
  var clone=document.getElementById('a4-page').cloneNode(true);
  clone.id='a4-pdf-clone';
  clone.style.cssText='font-family:'+selFont+';font-size:'+selSize+'pt;line-height:'+selLH+';width:210mm;height:297mm;background:#fff;color:#000;padding:12mm 16mm;overflow:visible;position:static;';
  offscreen.innerHTML='';
  offscreen.appendChild(clone);
  var filename=curCat==='cv'?'CV_'+(v('nama')||'dokumen'):'Surat_Lamaran_'+(v('nama')||'dokumen');
  filename=filename.replace(/\s+/g,'_');
  var btn=document.getElementById('btn-pdf');
  btn.disabled=true;btn.innerHTML='<i class="fa-solid fa-spinner fa-spin mr-1.5 text-xs"></i>Mengunduh...';
  html2pdf().set({
    margin:0,
    filename:filename+'.pdf',
    image:{type:'jpeg',quality:0.98},
    html2canvas:{scale:2,useCORS:true,letterRendering:true},
    jsPDF:{unit:'mm',format:'a4',orientation:'portrait'}
  }).from(clone).save().then(function(){
    btn.disabled=false;btn.innerHTML='<i class="fa-solid fa-file-pdf mr-1.5 text-xs"></i>Download PDF';
    offscreen.innerHTML='';
    toast('PDF berhasil diunduh!','success');
  }).catch(function(err){
    btn.disabled=false;btn.innerHTML='<i class="fa-solid fa-file-pdf mr-1.5 text-xs"></i>Download PDF';
    offscreen.innerHTML='';
    toast('Gagal mengunduh PDF','error');
    console.error(err);
  });
}
