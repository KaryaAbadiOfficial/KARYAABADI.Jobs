<head>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<script>
tailwind.config={darkMode:'class',theme:{extend:{fontFamily:{display:['Bebas Neue','sans-serif'],body:['DM Sans','sans-serif']},colors:{brand:{red:'#DC2626',darkred:'#991B1B',black:'#0A0A0A',dark:'#111111',card:'#1A1A1A',border:'#2A2A2A'}}}}}
</script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;transition:background .3s,color .3s}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#444;border-radius:3px}
.dark ::-webkit-scrollbar-thumb{background:#555}
.a4-page{width:210mm;height:297mm;background:#fff;color:#000;padding:12mm 16mm;overflow:hidden;position:relative}
.a4-page .st{font-weight:700;border-bottom:1.5pt solid #000;padding-bottom:1mm;margin-bottom:3mm;margin-top:4mm;letter-spacing:.3px}
.a4-page .st:first-child{margin-top:0}
.a4-page table{width:100%;border-collapse:collapse}
.a4-page table td{padding:.4mm 0;vertical-align:top}
.a4-page .fc{width:32mm;height:42mm;object-fit:cover;border:1px solid #bbb;flex-shrink:0}
.a4-page .fp{width:32mm;height:42mm;border:1px dashed #999;display:flex;align-items:center;justify-content:center;color:#999;font-size:7pt;flex-shrink:0}
.dp-t td{padding:.6mm 0}.dp-t .dl{width:48mm;white-space:nowrap}.dp-t .dc{width:3mm;text-align:center}
#toast-box{position:fixed;top:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px}
.toast-item{padding:12px 20px;border-radius:8px;color:#fff;font-size:14px;font-weight:500;transform:translateX(120%);transition:transform .3s;box-shadow:0 4px 12px rgba(0,0,0,.3)}
.toast-item.show{transform:translateX(0)}.toast-item.success{background:#16a34a}.toast-item.error{background:#dc2626}.toast-item.info{background:#2563eb}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.fade-up{animation:fadeUp .35s ease both}
@keyframes pulseRed{0%,100%{box-shadow:0 0 0 0 rgba(220,38,38,.4)}70%{box-shadow:0 0 0 8px rgba(220,38,38,0)}}
.pulse-red{animation:pulseRed 2s infinite}
.mob-tab{transition:all .2s}.mob-tab.active{color:#DC2626;border-color:#DC2626}
.fi{width:100%;padding:7px 10px;border-radius:6px;border:1px solid #d1d5db;font-size:12.5px;transition:border .2s,box-shadow .2s;background:#fff;color:#111}
.fi:focus{outline:none;border-color:#DC2626;box-shadow:0 0 0 3px rgba(220,38,38,.12)}
.dark .fi{background:#1A1A1A;border-color:#333;color:#e5e5e5}
.dark .fi:focus{border-color:#DC2626;box-shadow:0 0 0 3px rgba(220,38,38,.18)}
.fl{font-size:11.5px;font-weight:600;margin-bottom:2px;display:block;color:#555}.dark .fl{color:#aaa}
textarea.fi{resize:vertical;min-height:55px}
select.fi{cursor:pointer;-webkit-appearance:none;appearance:none;padding-right:30px}
.dyn-btn{font-size:13px;width:28px;height:28px;padding:0;border-radius:6px;font-weight:600;cursor:pointer;transition:all .15s;border:none;display:inline-flex;align-items:center;justify-content:center}
.dyn-btn:hover{filter:brightness(1.1)}.dyn-btn:active{transform:scale(.92)}
input[type=range]{-webkit-appearance:none;height:6px;border-radius:3px;background:#d1d5db;outline:none;flex:1}
.dark input[type=range]{background:#333}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:#DC2626;cursor:pointer}
.logo-box{width:36px;height:36px;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:#000000;border-radius:8px;overflow:hidden}
.logo-box img{width:100%;height:100%;object-fit:contain;padding:4px}
</style>
</head>
<body class="dark:bg-brand-black bg-gray-100 dark:text-gray-100 text-gray-800 min-h-screen flex flex-col">
<div id="toast-box"></div>

<header class="sticky top-0 z-50 bg-brand-dark/95 backdrop-blur-md border-b border-brand-border">
  <div class="max-w-7xl mx-auto px-4 h-14 flex items-center justify-between">
    <div class="flex items-center gap-2.5">
      <div class="logo-box">
        <img src="https://z-cdn-media.chatglm.cn/files/ebcd768e-a00c-4b6e-a0dd-17e9a5249985.png?auth_key=1875922570-3f960e782f4346bdb4c49cfd7d041a29-0-aeaaf8c7ad7e6240d2fddc53ac3d3eef" alt="Logo">
      </div>
      <span class="text-white font-bold text-lg tracking-wide">KARYA ABADI</span><span class="text-white font-bold text-sm">.Jobs</span>
    </div>
    <button onclick="toggleDark()" class="w-9 h-9 rounded-full bg-brand-card flex items-center justify-center hover:bg-brand-red/20 transition" aria-label="Toggle dark mode">
      <i class="dark:hidden fa-solid fa-moon text-sm text-gray-300"></i>
      <i class="hidden dark:inline fa-solid fa-sun text-sm text-yellow-400"></i>
    </button>
  </div>
</header>

<nav class="bg-brand-black border-b border-brand-border">
  <div class="max-w-7xl mx-auto px-4 flex gap-1">
    <button onclick="selectCat('cv')" id="cat-cv" class="cat-tab px-5 py-3 text-sm font-semibold border-b-2 border-brand-red text-brand-red transition">CV</button>
    <button onclick="selectCat('surat')" id="cat-surat" class="cat-tab px-5 py-3 text-sm font-semibold border-b-2 border-transparent text-gray-500 hover:text-brand-red transition">Surat Melamar Pekerjaan</button>
  </div>
</nav>

<div class="bg-brand-dark border-b border-brand-border overflow-x-auto">
  <div class="max-w-7xl mx-auto px-4 flex gap-2 py-3" id="tpl-tabs"></div>
</div>

<div class="lg:hidden flex border-b border-brand-border bg-brand-dark">
  <button onclick="switchMob('form')" id="mob-form" class="mob-tab active flex-1 py-2.5 text-sm font-semibold text-center border-b-2 border-brand-red">Formulir</button>
  <button onclick="switchMob('preview')" id="mob-preview" class="mob-tab flex-1 py-2.5 text-sm font-semibold text-center border-b-2 border-transparent text-gray-500">Preview A4</button>
</div>

<main class="flex-1 flex flex-col lg:flex-row max-w-7xl mx-auto w-full">
  <div id="form-panel" class="lg:w-[420px] xl:w-[460px] flex-shrink-0 overflow-y-auto p-4 dark:bg-brand-black bg-gray-100" style="max-height:calc(100vh - 200px)">
    <div id="form-content" class="space-y-3 fade-up"></div>
    <div class="flex gap-3 mt-5 mb-4">
      <button onclick="resetForm()" class="flex-1 py-2.5 rounded-lg font-semibold text-sm border dark:border-brand-border border-gray-300 dark:text-gray-300 text-gray-600 hover:border-red-500 hover:text-red-500 transition"><i class="fa-solid fa-rotate-left mr-1"></i> Reset</button>
      <button onclick="downloadPDF()" id="btn-pdf" class="flex-1 py-2.5 rounded-lg font-semibold text-sm bg-brand-red text-white hover:bg-brand-darkred transition pulse-red"><i class="fa-solid fa-file-pdf mr-1"></i> Download PDF</button>
    </div>
  </div>
  <div id="preview-panel" class="hidden lg:flex flex-1 flex-col p-4 dark:bg-brand-dark bg-gray-200 overflow-hidden" style="max-height:calc(100vh - 200px)">
    <div class="text-xs font-semibold mb-2 dark:text-gray-400 text-gray-500 uppercase tracking-wider"><i class="fa-solid fa-eye mr-1"></i> Preview A4 (210 x 297 mm)</div>
    <div id="preview-wrap" class="flex-1 overflow-auto rounded-lg dark:bg-gray-800 bg-gray-300 p-4 flex justify-center">
      <div id="a4-scaler" style="transform-origin:top center"><div id="a4-page" class="a4-page shadow-xl"></div></div>
    </div>
  </div>
</main>

<footer class="bg-brand-dark border-t border-brand-border mt-auto">
  <div class="max-w-7xl mx-auto px-4 py-4 text-center">
    <p class="text-xs text-gray-500">&copy; 2026 KARYA ABADI.Jobs. All Rights Reserved</p>
  </div>
</footer>

<div id="pdf-offscreen" style="position:absolute;left:0;top:0;z-index:-9999;pointer-events:none;overflow:visible"></div>

<script>
var curCat='cv',curTpl='cv1',photoData=null,mobTab='form';
var savedCV={},savedSurat={},selFont='Arial',selSize=10,selLH=1.4;
var eduList=[{t:'',n:'',y:''},{t:'',n:'',y:''},{t:'',n:'',y:''}];
var expList=[{j:'',m:'',pt:'',jl:'',kt:''}];
var hSkills=['','','','','',''];
var sSkills=['','','','','',''];

var CV_M=[{id:'cv1',name:'CV Template 1'},{id:'cv2',name:'CV Template 2'},{id:'cv3',name:'CV Template 3'}];
var ST_M=[{id:'s-op',name:'Online (Posisi)',pos:true,on:true},{id:'s-ou',name:'Online (Umum)',pos:false,on:true},{id:'s-tp',name:'Tulis Tangan (Posisi)',pos:true,on:false},{id:'s-tu',name:'Tulis Tangan (Umum)',pos:false,on:false}];

function v(id){var el=document.getElementById(id);return el?el.value:''}
function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function toast(msg,type){type=type||'success';var d=document.createElement('div');d.className='toast-item '+type;d.textContent=msg;document.getElementById('toast-box').appendChild(d);requestAnimationFrame(function(){d.classList.add('show')});setTimeout(function(){d.classList.remove('show');setTimeout(function(){d.remove()},300)},2500)}
function applyPageStyle(){var p=document.getElementById('a4-page');if(!p)return;p.style.fontFamily=selFont;p.style.fontSize=selSize+'pt';p.style.lineHeight=selLH}

function saveStatic(){var d={};document.querySelectorAll('.fi-s').forEach(function(el){if(el.id)d[el.id]=el.value});if(curCat==='cv')savedCV=d;else savedSurat=d}
function restoreStatic(){var d=curCat==='cv'?savedCV:savedSurat;if(!d||!Object.keys(d).length)return;Object.keys(d).forEach(function(id){var el=document.getElementById(id);if(el)el.value=d[id]})}
function restorePhoto(){if(!photoData)return;var img=document.getElementById('photo-thumb');if(img){img.src=photoData;img.classList.remove('hidden')}var ph=document.getElementById('photo-ph');if(ph)ph.classList.add('hidden')}

function selectCat(cat){saveStatic();curCat=cat;curTpl=cat==='cv'?'cv1':'s-op';updCatTabs();renderTplTabs();renderForm();renderPreview()}
function selectTpl(id){saveStatic();curTpl=id;renderTplTabs();renderForm();renderPreview()}
function updCatTabs(){document.querySelectorAll('.cat-tab').forEach(function(t){t.classList.remove('border-brand-red','text-brand-red');t.classList.add('border-transparent','text-gray-500')});var el=document.getElementById('cat-'+curCat);el.classList.add('border-brand-red','text-brand-red');el.classList.remove('border-transparent','text-gray-500')}
function renderTplTabs(){var list=curCat==='cv'?CV_M:ST_M;document.getElementById('tpl-tabs').innerHTML=list.map(function(t){return'<button onclick="selectTpl(\''+t.id+'\')" class="tpl-tab px-4 py-1.5 rounded-full text-xs font-semibold whitespace-nowrap transition '+(t.id===curTpl?'bg-brand-red text-white':'bg-brand-card text-gray-300 hover:bg-brand-red hover:text-white')+'">'+t.name+'</button>'}).join('')}
function switchMob(tab){mobTab=tab;var fp=document.getElementById('form-panel'),pp=document.getElementById('preview-panel'),mf=document.getElementById('mob-form'),mp=document.getElementById('mob-preview');if(tab==='form'){fp.classList.remove('hidden');pp.classList.add('hidden','lg:flex');mf.classList.add('active');mp.classList.remove('active')}else{fp.classList.add('hidden');pp.classList.remove('hidden','lg:flex');pp.classList.add('flex');mp.classList.add('active');mf.classList.remove('active')}setTimeout(scalePreview,60)}

function fldH(id,lb,ph,dv){var va=dv!==undefined?' value="'+esc(dv)+'"':'';return'<div><label class="fl">'+lb+'</label><input id="'+id+'" class="fi fi-s" placeholder="'+(ph||'')+'"'+va+' oninput="renderPreview()"></div>'}
function fldUnit(id,lb,ph,unit){return'<div><label class="fl">'+lb+'</label><div class="relative"><input id="'+id+'" class="fi fi-s" style="padding-right:36px" placeholder="'+(ph||'')+'" oninput="renderPreview()"><span class="absolute right-3 top-1/2 -translate-y-1/2 text-xs dark:text-gray-500 text-gray-400 pointer-events-none font-semibold">'+unit+'</span></div></div>'}
function selH(id,lb,opts){var h='<div><label class="fl">'+lb+'</label><div class="relative"><select id="'+id+'" class="fi fi-s" onchange="renderPreview()">';opts.forEach(function(o){h+='<option value="'+esc(o.v)+'">'+esc(o.l)+'</option>'});h+='</select><i class="fa-solid fa-chevron-down absolute right-3 top-1/2 -translate-y-1/2 text-xs dark:text-gray-400 text-gray-500 pointer-events-none"></i></div></div>';return h}
var jkOpts=[{v:'',l:'-- Pilih --'},{v:'Laki-laki',l:'Laki-laki'},{v:'Perempuan',l:'Perempuan'}];
function taH(id,lb,ph){return'<div><label class="fl">'+lb+'</label><textarea id="'+id+'" class="fi fi-s" placeholder="'+(ph||'')+'" oninput="renderPreview()"></textarea></div>'}
function secH(lb){return'<div class="dark:text-brand-red text-red-600 font-bold text-sm mt-4 mb-2 flex items-center gap-2"><span class="w-1 h-4 bg-brand-red rounded-full inline-block"></span>'+lb+'</div>'}
function photoH(){return'<div class="dark:bg-brand-card bg-white rounded-xl p-4 border dark:border-brand-border border-gray-200"><label class="fl"><i class="fa-solid fa-camera mr-1 text-brand-red"></i> Upload Pas Foto</label><div class="flex items-center gap-4 mt-2"><label class="cursor-pointer w-24 h-32 rounded-lg border-2 border-dashed dark:border-brand-border border-gray-300 flex flex-col items-center justify-center hover:border-brand-red transition overflow-hidden flex-shrink-0"><img id="photo-thumb" src="" class="w-full h-full object-cover hidden"><span id="photo-ph" class="text-xs dark:text-gray-500 text-gray-400 text-center px-1"><i class="fa-solid fa-upload text-lg mb-1"></i><br>Pas Foto</span><input type="file" accept="image/*" onchange="handlePhoto(event)" class="hidden"></label><span class="text-xs dark:text-gray-500 text-gray-400">JPG/PNG, Maks 2MB</span></div></div>'}
function settingsH(){return'<div class="dark:bg-brand-card bg-white rounded-xl p-4 border dark:border-brand-border border-gray-200 space-y-3"><div class="fl mb-1"><i class="fa-solid fa-sliders mr-1 text-brand-red"></i> Pengaturan Tampilan</div><div><label class="text-xs dark:text-gray-400 text-gray-500 mb-1 block">Font Dokumen</label><div class="relative"><select id="font-sel" class="fi" onchange="selFont=this.value;applyPageStyle();renderPreview()"><option value="Arial"'+(selFont==='Arial'?' selected':'')+'>Arial</option><option value="Times New Roman"'+(selFont==='Times New Roman'?' selected':'')+'>Times New Roman</option><option value="Calibri"'+(selFont==='Calibri'?' selected':'')+'>Calibri</option></select><i class="fa-solid fa-chevron-down absolute right-3 top-1/2 -translate-y-1/2 text-xs dark:text-gray-400 text-gray-500 pointer-events-none"></i></div></div><div><label class="text-xs dark:text-gray-400 text-gray-500 mb-1 block">Ukuran Font</label><div class="flex items-center gap-3"><input type="range" min="10" max="16" step="0.5" value="'+selSize+'" oninput="selSize=parseFloat(this.value);document.getElementById(\'sz-v\').textContent=this.value+\'pt\';applyPageStyle();renderPreview()"><span id="sz-v" class="text-xs font-semibold dark:text-gray-300 text-gray-600 w-10 text-right">'+selSize+'pt</span></div></div><div><label class="text-xs dark:text-gray-400 text-gray-500 mb-1 block">Jarak Baris</label><div class="flex items-center gap-3"><input type="range" min="1.2" max="2.0" step="0.1" value="'+selLH+'" oninput="selLH=parseFloat(this.value);document.getElementById(\'lh-v\').textContent=this.value;applyPageStyle();renderPreview()"><span id="lh-v" class="text-xs font-semibold dark:text-gray-300 text-gray-600 w-6 text-right">'+selLH+'</span></div></div></div>'}
function dynBtns(addFn,rmFn){return'<div class="flex gap-2 mt-2"><button onclick="'+addFn+'" class="dyn-btn bg-green-600 text-white" title="Tambah"><i class="fa-solid fa-plus"></i></button><button onclick="'+rmFn+'" class="dyn-btn bg-red-600 text-white" title="Kurangi"><i class="fa-solid fa-minus"></i></button></div>'}

function renderEduF(){var c=document.getElementById('edu-c');if(!c)return;c.innerHTML=eduList.map(function(e,i){return'<div class="grid grid-cols-5 gap-2 items-end '+(i>0?'mt-2':'')+'"><div class="col-span-3"><label class="fl">Nama Sekolah</label><input class="fi" placeholder="....." value="'+esc(e.t)+'" oninput="eduList['+i+'].t=this.value;renderPreview()"></div><div class="col-span-2"><label class="fl">Tahun Lulus</label><input class="fi" placeholder="0000/0000" value="'+esc(e.y)+'" oninput="eduList['+i+'].y=this.value;renderPreview()"></div></div>'}).join('')}
function renderExpF(){var c=document.getElementById('exp-c');if(!c)return;c.innerHTML=expList.map(function(e,i){var h='';if(i>0)h+='<hr class="dark:border-brand-border border-gray-200 my-3">';h+='<div class="space-y-2"><div class="grid grid-cols-2 gap-2"><div><label class="fl">Jabatan/Posisi</label><input class="fi" placeholder="....." value="'+esc(e.j)+'" oninput="expList['+i+'].j=this.value;renderPreview()"></div><div><label class="fl">Masa Kerja</label><input class="fi" placeholder="Tanggal Bulan Tahun" value="'+esc(e.m)+'" oninput="expList['+i+'].m=this.value;renderPreview()"></div></div><div><label class="fl">Perusahaan</label><input class="fi" placeholder="PT./CV./....." value="'+esc(e.pt)+'" oninput="expList['+i+'].pt=this.value;renderPreview()"></div><div><label class="fl">Jalan</label><input class="fi" placeholder="Jl. ....." value="'+esc(e.jl)+'" oninput="expList['+i+'].jl=this.value;renderPreview()"></div><div><label class="fl">Kota, Kode Pos</label><input class="fi" placeholder="....." value="'+esc(e.kt)+'" oninput="expList['+i+'].kt=this.value;renderPreview()"></div></div>';return h}).join('')}

function renderSkIF(arr,cid,title,type){
  var c=document.getElementById(cid);if(!c)return;var h='';
  for(var i=0;i<arr.length;i++){
    h+='<div class="flex gap-2 items-center"><input class="fi flex-1" placeholder="Keahlian '+(i+1)+'" value="'+esc(arr[i])+'" oninput="window._updSk(\''+type+'\','+i+',this.value)"><button onclick="window._rmSk(\''+type+'\','+i+')" class="w-7 h-7 rounded flex items-center justify-center bg-red-100 dark:bg-red-900/30 text-red-600 hover:bg-red-200 dark:hover:bg-red-900/50 transition flex-shrink-0" title="Hapus"><i class="fa-solid fa-minus text-xs"></i></button></div>';
  }
  h+='<button onclick="window._addSk(\''+type+'\')" class="dyn-btn bg-green-600 text-white mt-2" title="Tambah"><i class="fa-solid fa-plus"></i></button>';
  c.innerHTML=h;
}
window._updSk=function(type,idx,val){if(type==='hard')hSkills[idx]=val;else sSkills[idx]=val;renderPreview()};
window._rmSk=function(type,idx){var arr=type==='hard'?hSkills:sSkills;if(arr.length>1){arr.splice(idx,1);renderSkIF(arr,type==='hard'?'hard-c':'soft-c',type==='hard'?'Hard Skill':'Soft Skill',type);renderPreview()}};
window._addSk=function(type){var arr=type==='hard'?hSkills:sSkills;arr.push('');renderSkIF(arr,type==='hard'?'hard-c':'soft-c',type==='hard'?'Hard Skill':'Soft Skill',type);renderPreview()};

function addEdu(){eduList.push({t:'',n:'',y:''});renderEduF();renderPreview()}
function rmEdu(){if(eduList.length>1){eduList.pop();renderEduF();renderPreview()}}
function addExp(){expList.push({j:'',m:'',pt:'',jl:'',kt:''});renderExpF();renderPreview()}
function rmExp(){if(expList.length>1){expList.pop();renderExpF();renderPreview()}}

function renderForm(){
  var fc=document.getElementById('form-content');
  if(curCat==='cv'){
    var h=settingsH()+photoH();
    h+='<div class="dark:bg-brand-card bg-white rounded-xl p-4 border dark:border-brand-border border-gray-200"><label class="fl"><i class="fa-solid fa-user-graduate mr-1 text-brand-red"></i> Deskripsi Profil (otomatis terisi)</label><div class="grid grid-cols-2 gap-2 mt-2"><div><label class="text-xs dark:text-gray-400 text-gray-500 mb-1 block">Lulusan</label><input id="lulusan" class="fi fi-s" placeholder="Contoh: S1 Universitas Indonesia" oninput="renderPreview()"></div><div><label class="text-xs dark:text-gray-400 text-gray-500 mb-1 block">Jurusan</label><input id="jurusan" class="fi fi-s" placeholder="Contoh: Teknik Informatika" oninput="renderPreview()"></div></div></div>';
    if(curTpl==='cv1'){
      h+=taH('profil','Profil (opsional, isi jika ingin mengubah)','Saya lulusan ….. dengan latar belakang jurusan ….. .Berbekal fondasi akademis dan semangat untuk terus belajar, saya siap memberikan kontribusi positif dalam lingkungan kerja serta antusias dalam mengembangkan keterampilan baru untuk mencapai tujuan Perusahaan.');
      h+=secH('Data Pribadi');
      h+=fldH('nama','Nama','.....');h+=fldH('ttl','Tempat, Tanggal Lahir','.....');
      h+=selH('jk','Jenis Kelamin',jkOpts);h+=fldH('bangsa','Bangsa','.....');
      h+=fldH('agama','Agama','.....');h+=fldUnit('tb','Tinggi Badan','.....','cm');
      h+=fldUnit('bb','Berat Badan','.....','kg');h+=fldH('alamat1','Alamat','.....');
      h+=fldH('alamat2','Alamat lanjutan','.....');h+=fldH('nohp','No. HP','.....');
      h+=fldH('status','Status','.....');h+=fldH('email','Email','.....');
    }
    if(curTpl==='cv2'){
      h+=fldH('nama','Nama (Judul)','.....');
      h+=fldH('ttl','Tempat, Tanggal Lahir','.....');
      h+=selH('jk','Jenis Kelamin',jkOpts);h+=fldH('bangsa','Bangsa','.....');
      h+=fldH('agama','Agama','.....');
      h+=fldUnit('tb','Tinggi Badan','.....','cm');h+=fldUnit('bb','Berat Badan','.....','kg');

function getProfil(defText){
  var lu=v('lulusan'),ju=v('jurusan'),pr=v('profil');

function eduPH(list){var h='<table>';list.forEach(function(e){h+='<tr><td>'+(e.t||'……………….')+'</td><td style="text-align:right">'+(e.y||'……………….')+'</td></tr>'});h+='</table>';return h}
function expPH(list){return list.map(function(e){return'<div style="margin-bottom:2mm"><div style="display:flex;justify-content:space-between"><span style="font-weight:600">'+(e.j||'Jabatan/Posisi')+'</span><span>'+(e.m||'………………………..')+'</span></div><div>'+(e.pt||'PT./CV./…..')+'</div><div>'+(e.jl||'Jl. …..')+'</div><div>'+(e.kt||'Kota, Kode Pos')+'</div></div>'}).join('')}

/* CV1 & CV2: keahlian 2 kolom sama rata, label di kiri */
function skPH2col(title,skills){
  if(!skills||!skills.length)return '';
  var rows=Math.ceil(skills.length/2);
  var h='<table style="width:100%;margin-bottom:1mm;table-layout:fixed"><colgroup><col style="width:25mm"><col><col></colgroup>';
  for(var r=0;r<rows;r++){
    h+='<tr>';
    if(r===0)h+='<td rowspan="'+rows+'" style="font-weight:600;vertical-align:top;padding-right:2mm">'+title+'</td>';
    var i1=r*2,i2=r*2+1;
    h+='<td>\u2022 '+(esc(skills[i1])||'……………….')+'</td>';
    h+='<td>'+(i2<skills.length?'\u2022 '+esc(skills[i2]):'')+'</td>';
    h+='</tr>';
  }
  h+='</table>';
  return h;
}

/* CV3: keahlian vertikal, label di atas */
function skPH3(title,skills){
  if(!skills||!skills.length)return '';
  var items=skills.filter(function(s){return s&&s.trim()});
  if(!items.length)return '';
  var h='<div style="margin-bottom:2mm"><div style="font-weight:600">'+title+'</div>';
  items.forEach(function(s){h+='<div>\u2022 '+esc(s)+'</div>'});
  h+='</div>';
  return h;
}

function renderPreview(){

function scalePreview(){var w=document.getElementById('preview-wrap'),p=document.getElementById('a4-page'),s=document.getElementById('a4-scaler');if(!w||!p||!s)return;var pw=p.offsetWidth,ww=w.clientWidth-32;if(!pw||!ww)return;var sc=Math.min(1,ww/pw);s.style.transform='scale('+sc+')');s.style.width=Math.ceil(pw*sc)+'px';s.style.height=Math.ceil(p.offsetHeight*sc)+'px'}

function handlePhoto(e){var f=e.target.files[0];if(!f)return;if(f.size>2*1024*1024){toast('Ukuran foto maks 2MB','error');return}var r=new FileReader();r.onload=function(ev){photoData=ev.target.result;var img=document.getElementById('photo-thumb');img.src=photoData;img.classList.remove('hidden');document.getElementById('photo-ph').classList.add('hidden');renderPreview()};r.readAsDataURL(f)}

function resetForm(){

  if(curCat==='cv'){eduList=[{t:'',n:'',y:''},{t:'',n:'',y:''},{t:'',n:'',y:''}];expList=[{j:'',m:'',pt:'',jl:'',kt:''}];hSkills=['','','','','',''];sSkills=['','','','','',''];renderEduF();renderExpF();renderSkIF(hSkills,'hard-c','Hard Skill','hard');renderSkIF(sSkills,'soft-c','Soft Skill','soft');savedCV={}}
  else{savedSurat={}}
  renderPreview();toast('Formulir berhasil direset','info');
}

async function downloadPDF(){
  var btn=document.getElementById('btn-pdf');
  btn.disabled=true;btn.classList.remove('pulse-red');btn.style.opacity='0.6';
  toast('Menghasilkan PDF...','info');
  var page=document.getElementById('a4-page');
  var container=document.getElementById('pdf-offscreen');
  container.innerHTML='';
  var cl=page.cloneNode(true);
  cl.style.fontFamily=selFont;cl.style.fontSize=selSize+'pt';cl.style.lineHeight=selLH;
  cl.style.transform='none';cl.style.position='relative';cl.style.margin='0';cl.style.boxShadow='none';
  container.appendChild(cl);
  await new Promise(function(resolve){setTimeout(resolve,400)});
  try{
    await html2pdf().set({margin:0,filename:(curCat==='cv'?'CV':'Surat_Lamaran')+'_'+(v('nama')||'Dokumen')+'.pdf',image:{type:'jpeg',quality:0.95},html2canvas:{scale:2,useCORS:true,logging:false,backgroundColor:'#ffffff',width:cl.offsetWidth,height:cl.offsetHeight},jsPDF:{unit:'mm',format:'a4',orientation:'portrait'}}).from(cl).save();
    toast('PDF berhasil diunduh!');
  }catch(e){toast('Gagal mengunduh PDF','error');console.error(e)}
  finally{container.innerHTML='';btn.disabled=false;btn.classList.add('pulse-red');btn.style.opacity='1'}
}

function toggleDark(){document.documentElement.classList.toggle('dark');localStorage.setItem('ka-dark',document.documentElement.classList.contains('dark')?'1':'0');setTimeout(scalePreview,100)}

function init(){

  renderTplTabs();renderForm();renderPreview();

}
document.addEventListener('DOMContentLoaded',init);
</script>
