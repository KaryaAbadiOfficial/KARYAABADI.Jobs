.toast-item{padding:12px 20px;border-radius:8px;color:#fff;font-size:14px;font-weight:500;transform:translateX(120%);transition:transform .3s;pointer-events:auto;will-change:transform}
.toast-item.show{transform:translateX(0)}
.toast-item.success{background:#991B1B}
.toast-item.error{background:#DC2626}
.toast-item.info{background:#333}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.fade-up{animation:fadeUp .3s ease both}
@keyframes pulseRed{0%,100%{box-shadow:0 0 0 0 rgba(220,38,38,.4)}70%{box-shadow:0 0 0 8px rgba(220,38,38,0)}}
.pulse-red{animation:pulseRed 2s infinite}
.mob-tab{transition:all .2s}.mob-tab.active{color:#DC2626;border-color:#DC2626}
.fi{width:100%;padding:7px 10px;border-radius:6px;border:1px solid #d1d5db;font-size:12.5px;transition:border .2s,box-shadow .2s;background:#fff;color:#111}

.fl{font-size:11.5px;font-weight:600;margin-bottom:2px;display:block;color:#555}.dark .fl{color:#aaa}

select.fi{cursor:pointer;-webkit-appearance:none;appearance:none;padding-right:30px}
.dyn-btn{font-size:13px;width:28px;height:28px;padding:0;border-radius:6px;font-weight:600;cursor:pointer;transition:all .15s;border:none;display:inline-flex;align-items:center;justify-content:center}
.dyn-btn:hover{filter:brightness(1.1)}.dyn-btn:active{transform:scale(.92)}
.dyn-add{background:#fff;color:#DC2626;border:2px solid #DC2626}
.dyn-add:hover{background:#DC2626;color:#fff}
.dark .dyn-add{background:#1A1A1A}

.dark input[type=range]{background:#333}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:#DC2626;cursor:pointer}

function selH(id,lb,opts){var h='<div><label class="fl">'+lb+'</label><div class="relative"><select id="'+id+'" class="fi fi-s" onchange="renderPreview()">';opts.forEach(function(o){h+='<option value="'+esc(o.v)+'">'+esc(o.l)+'</option>'});h+='</select><i class="fa-solid fa-chevron-down absolute right-3 top-1/2 -translate-y-1/2 text-xs dark:text-gray-400 text-gray-500 pointer-events:none"></i></div></div></div>';return h}

function photoH(){return'<div class="dark:bg-brand-card bg-white rounded-xl p-4 border dark:border-brand-border border-gray-200"><label class="fl flex items-center gap-2"><i class="fa-solid fa-camera text-brand-red"></i> Upload Pas Foto</label><div class="flex items-center gap-4 mt-2"><label class="cursor-pointer w-24 h-32 rounded-lg border-2 border-dashed dark:border-brand-border border-gray-300 flex flex-col items-center justify-content-center hover:border-brand-red transition overflow-hidden flex-shrink-0"><img id="photo-thumb" src="" class="w-full h-full object-cover hidden"><span id="photo-ph" class="text-xs dark:text-gray-500 text-gray-400 text-center px-1"><i class="fa-solid fa-upload text-lg mb-1"></i><br>Pas Foto</span><input type="file" accept="image/*" onchange="handlePhoto(event)" class="hidden"></label><span class="text-xs dark:text-gray-500 text-gray-400">JPG/PNG, Maks 2MB</span></div></div></div>'}

  var items=(skills||[]).filter(function(s){return s&&s.trim()});

  var half=Math.ceil(items.length/2),left=items.slice(0,half),right=items.slice(half),rows=Math.max(left.length,right.length);
  var h='<table style="width:100%;margin-bottom:2mm">';
  for(var r=0;r<rows;r++){h+='<tr>';if(r===0)h+='<td rowspan="'+rows+'" style="width:48mm;font-weight:600;vertical-align:top;padding-right:0">'+title+'</td>';

  h+='<td style="width:65mm;padding:0.3mm 0;text-align:right">'+(r<right.length?'\u2022 '+esc(right[r]):'')+'</td></tr>'}

  function dr(l,val){return'<tr><td style="padding-right:3mm;padding-top:.5mm;white-space:nowrap">'+l+'</td><td style="padding-top:.5mm">: '+val+'</td></tr>'}
  var al2r=AL2?'<tr><td style="padding-right:3mm;padding-top:.5mm;white-space:nowrap">&nbsp;</td><td style="padding-top:.5mm;padding-left:2mm">'+esc(AL2)+'</td></tr>':'';
  var tw='<div style="text-align:right">'+esc(sK)+', '+esc(sT)+' '+esc(sBT)+'</div>';
  var hl='<table style="width:auto;margin-bottom:1mm;margin-top:1mm"><tr><td style="width:18mm;padding-right:2mm">Hal</td><td style="padding-left:2mm">: Lamaran Pekerjaan</td></tr><tr><td style="width:18mm;padding-right:2mm">Lampiran</td><td style="padding-left:2mm">: '+lc+' lembar</td></tr></table>';
  var at='<div style="margin-top:2mm">Kepada Yth,</div><div>Bapak/Ibu HRD</div><div>'+esc(PT)+'</div><div>'+esc(JL)+'</div>';
  if(JL2&&JL2.trim())at+='<div style="padding-left:5mm">'+esc(JL2.trim())+'</div>';
  at+='<div style="margin-top:4mm">Dengan hormat,</div><div style="margin-top:4mm">Sesuai dengan informasi adanya lowongan pekerjaan di '+esc(PT)+' yang saya peroleh dari '+esc(SUM)+', '+lt+'.</div>';
  var dp='<div style="margin-top:3mm">Saya yang bertanda tangan di bawah ini:</div><table style="width:auto;margin-top:1mm;margin-bottom:1mm">'+dr('Nama',esc(N))+dr('Tempat dan Tanggal Lahir',esc(TTL))+dr('Jenis Kelamin',esc(JK))+dr('Agama',esc(AG))+dr('Pendidikan Terakhir',esc(PA))+dr('Alamat',esc(AL))+al2r+dr('Email',esc(EM))+dr('No HP',esc(HP))+'</table>';
  var lm='<div style="margin-top:2mm">Sebagai bahan pertimbangan bagi Bapak/Ibu bersama surat ini turut saya lampirkan:</div><div style="margin-left:5mm;margin-top:1mm">'+lamps+'</div>';
  var pn='<div style="margin-top:3mm;text-align:justify">Demikian surat lamaran pekerjaan ini saya buat dengan sebenarnya dan besar harapan saya untuk bergabung dengan perusahaan yang Bapak/Ibu pimpin. Atas perhatian dan kebijaksanaan Bapak/Ibu pimpinan, saya ucapkan terima kasih.</div>';
  var td='<div style="margin-top:4mm;text-align:right"><div>Hormat saya,</div><div style="margin-top:12mm;font-weight:700">'+esc(TTD)+'</div></div>';
  return tw+hl+at+dp+lm+pn+td;
}

function renderPreview(){
  var page=document.getElementById('a4-page');if(!page)return;applyPageStyle();
  if(curCat==='cv'){if(curTpl==='cv1')page.innerHTML=renderCV1();else if(curTpl==='cv2')page.innerHTML=renderCV2();else page.innerHTML=renderCV3()}
  else page.innerHTML=renderSuratP();
  setTimeout(scalePreview,30);
}

function scalePreview(){
  var w=document.getElementById('preview-wrap'),p=document.getElementById('a4-page'),s=document.getElementById('a4-scaler');
  if(!w||!p||!s)return;
  var pw=p.offsetWidth,ww=w.clientWidth-32;
  if(!pw||!ww)return;
  var sc=Math.min(1,ww/pw);
  s.style.transform='none';s.style.transformOrigin='';s.style.width='';s.style.height='';s.style.zoom=sc;
}

function handlePhoto(e){var f=e.target.files[0];if(!f)return;if(f.size>2*1024*1024){toast('Ukuran foto maks 2MB','error');return}var r=new FileReader();r.onload=function(ev){photoData=ev.target.result;var img=document.getElementById('photo-thumb');img.src=photoData;img.classList.remove('hidden');document.getElementById('photo-ph').classList.add('hidden');renderPreview()};r.readAsDataURL(f)}

function resetForm(){
  document.querySelectorAll('.fi-s').forEach(function(el){el.value=''});
  photoData=null;var img=document.getElementById('photo-thumb');if(img){img.src='';img.classList.add('hidden')}var ph=document.getElementById('photo-ph');if(ph)ph.classList.remove('hidden');
  if(curCat==='cv'){eduList=[{t:'',n:'',y:''},{t:'',n:'',y:''},{t:'',n:'',y:''},{t:'',n:'',y:''}];expList=[{j:'',m:'',pt:'',jl:'',kt:''}];hSkills=['','','','','','','','','',''];sSkills=['','','','','','','','','','','',''];renderEduF();renderExpF();renderSkIF(hSkills,'hard-c','hard');renderSkIF(sSkills,'soft-c','soft');savedCV={}}
  else{lampList=['',''];renderLampF();savedSurat={}}
  renderPreview();toast('Formulir berhasil direset','info');
}

async function downloadPDF(){
  var btn=document.getElementById('btn-pdf');btn.disabled=true;btn.classList.remove('pulse-red');btn.style.opacity='0.6';
  toast('Menghasilkan PDF...','info');
  var page=document.getElementById('a4-page');var container=document.getElementById('pdf-offscreen');container.innerHTML='';
  var cl=page.cloneNode(true);cl.style.fontFamily=selFont;cl.style.fontSize=selSize+'pt';cl.style.lineHeight=selLH;cl.style.zoom='1';cl.style.transform='none';cl.style.position='relative';cl.style.margin='0';cl.style.boxShadow='none';
  container.appendChild(cl);
  await new Promise(function(resolve){setTimeout(resolve,400)});
  try{await html2pdf().set({margin:0,filename:(curCat==='cv'?'CV':'Surat_Lamaran')+'_'+(v('nama')||'Dokumen')+'.pdf',image:{type:'jpeg',quality:0.95},html2canvas:{scale:2,useCORS:true,logging:false,backgroundColor:'#ffffff',width:cl.offsetWidth,height:cl.offsetHeight},jsPDF:{unit:'mm',format:'a4',orientation:'portrait'}}).from(cl).save();toast('PDF berhasil diunduh!')}
  catch(e){toast('Gagal mengunduh PDF','error');console.error(e)}
  finally{container.innerHTML='';btn.disabled=false;btn.classList.add('pulse-red');btn.style.opacity='1'}
}

function toggleDark(){document.documentElement.classList.toggle('dark');localStorage.setItem('ka-dark',document.documentElement.classList.contains('dark')?'1':'0');setTimeout(scalePreview,100)}

function init(){
  if(localStorage.getItem('ka-dark')==='0')document.documentElement.classList.remove('dark');
  renderTplTabs();renderForm();renderPreview();
  window.addEventListener('resize',scalePreview);
  if(window.ResizeObserver)new ResizeObserver(scalePreview).observe(document.getElementById('preview-wrap'));
}
document.addEventListener('DOMContentLoaded',init);
</script>
