function _bl2col(arr){
  var items=arr.filter(function(s){return s&&s.trim()});
  var half=Math.ceil(items.length/2);
  var col1=items.slice(0,half),col2=items.slice(half);
  function bl(a){return a.map(function(s){return '<table style="width:100%;border-collapse:collapse;margin-bottom:0.3mm"><tr><td style="width:3mm;vertical-align:top;padding:0">\u2022</td><td style="vertical-align:top;padding:0;text-align:justify">'+esc(s.trim())+'</td></tr></table>'}).join('')}
  return '<table style="width:100%"><tr><td style="width:50%;vertical-align:top;padding:0.3mm 2mm 0.3mm 0">'+bl(col1)+'</td><td style="width:50%;vertical-align:top;padding:0.3mm 0">'+bl(col2)+'</td></tr></table>';
}

function skCombined(hardSkills,softSkills){
  var hItems=(hardSkills||[]).filter(function(s){return s&&s.trim()});
  var sItems=(softSkills||[]).filter(function(s){return s&&s.trim()});
  if(!hItems.length)hItems=['……………….','……………….','……………….','……………….','……………….','……………….'];
  if(!sItems.length)sItems=['……………….','……………….','……………….','……………….','……………….','……………….'];
  var html='<div style="font-weight:700;margin-bottom:1mm">Hard Skill</div>';
  html+=_bl2col(hItems);
  html+='<div style="font-weight:700;margin-top:3mm;margin-bottom:1mm">Soft Skill</div>';
  html+=_bl2col(sItems);
  return html;
}

function skCV3single(hardSkills,softSkills){
  var hItems=(hardSkills||[]).filter(function(s){return s&&s.trim()});
  var sItems=(softSkills||[]).filter(function(s){return s&&s.trim()});
  var h='';

  if(sItems.length){h+='<div style="font-weight:700;margin-top:3mm;margin-bottom:1mm">Soft Skill</div>';h+=_bl2col(sItems)}

}

function handlePhoto(e){
  var file=e.target.files[0];if(!file)return;
  if(file.size>2*1024*1024){toast('Ukuran file maks 2MB','error');return}
  var reader=new FileReader();
  reader.onload=function(ev){
    photoData=ev.target.result;
    var img=document.getElementById('photo-thumb');
    if(img){img.src=photoData;img.classList.remove('hidden')}
    var ph=document.getElementById('photo-ph');
    if(ph)ph.classList.add('hidden');
    renderPreview();
  };
  reader.readAsDataURL(file);
}
