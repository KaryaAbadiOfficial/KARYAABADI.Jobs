<style>
:root{--bg:#f3f4f6;--fg:#1f2937;--mt:#6b7280;--ac:#dc2626;--cd:#ffffff;--bd:#e5e7eb;--ib:#fff;--fi-bg:#fff;--fi-txt:#111;--hd-bg:#000;--hd-tx:#fff}
body.dark{--bg:#111827;--fg:#f3f4f6;--mt:#9ca3af;--cd:#1f2937;--bd:#374151;--ib:#1f2937;--fi-bg:#374151;--fi-txt:#f3f4f6;--hd-bg:#000;--hd-tx:#fff}
*{box-sizing:border-box;scrollbar-width:thin;scrollbar-color:var(--bd) transparent}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--fg);margin:0;transition:background .3s,color .3s}
body::after{content:'';position:fixed;inset:0;background-image:radial-gradient(circle,var(--bd) .8px,transparent .8px);background-size:22px 22px;opacity:.35;pointer-events:none;z-index:0}
body.dark::after{opacity:.15}
header,section,div[style*="z-index"],footer,.tst,#rstm{position:relative;z-index:1}
.fi{width:100%;padding:10px 14px;border:1.5px solid var(--bd);border-radius:8px;background:var(--fi-bg);color:var(--fi-txt);font-family:'Outfit',sans-serif;font-size:13px;transition:border-color .2s,box-shadow .2s;outline:none}
.fi:focus{border-color:var(--ac);box-shadow:0 0 0 3px rgba(220,38,38,.1)}
.fi::placeholder{color:var(--mt)}
select.fi{cursor:pointer;appearance:auto}
.fl{display:block;font-size:11px;font-weight:700;color:var(--mt);margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
.sh{display:flex;align-items:center;justify-content:space-between;padding:14px 0;cursor:pointer;user-select:none;border-bottom:1px solid var(--bd)}
.sh h3{font-size:13px;font-weight:700;color:var(--fg);margin:0;display:flex;align-items:center;gap:8px}
.sh i.chv{font-size:10px;color:var(--mt);transition:transform .25s}
.sh.cl i.chv{transform:rotate(-90deg)}
.sb{overflow:hidden;transition:max-height .35s ease,opacity .25s;max-height:5000px;opacity:1;padding:12px 0}
.sb.cl{max-height:0;opacity:0;padding:0}
.tc{flex-shrink:0;width:115px;padding:12px 8px;background:#fff;border:2px solid transparent;border-radius:12px;cursor:pointer;transition:all .25s cubic-bezier(.4,0,.2,1);box-shadow:0 2px 8px rgba(0,0,0,.06);text-align:center}
.tc:hover{box-shadow:0 8px 20px rgba(0,0,0,.1);transform:translateY(-3px)}
.tc.on-red{border-color:#dc2626;background:#fef2f2;box-shadow:0 0 0 1px #dc2626,0 6px 16px rgba(220,38,38,.15)}
.tc.on-wh{border-color:#374151;background:#f9fafb;box-shadow:0 0 0 1px #374151,0 6px 16px rgba(0,0,0,.08)}
body.dark .tc{background:#1f2937;box-shadow:0 2px 8px rgba(0,0,0,.2)}
body.dark .tc.on-red{background:#1c0a0a;border-color:#dc2626;box-shadow:0 0 0 1px #dc2626,0 6px 16px rgba(220,38,38,.2)}
body.dark .tc.on-wh{background:#111827;border-color:#6b7280;box-shadow:0 0 0 1px #6b7280,0 6px 16px rgba(0,0,0,.3)}
.tc .th{width:100%;aspect-ratio:1/1;background:var(--bg);border-radius:10px;display:flex;align-items:center;justify-content:center;margin-bottom:8px}
.tc.on-red .th{background:#fee2e2}
.tc.on-wh .th{background:#e5e7eb}
body.dark .tc .th{background:#111827}
body.dark .tc.on-red .th{background:#3b1111}
body.dark .tc.on-wh .th{background:#1f2937}
.pb{width:90px;aspect-ratio:3/4;border:2px dashed var(--bd);border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;transition:border-color .2s,background .2s;background:var(--ib);position:relative}
.pb:hover{border-color:var(--ac);background:rgba(220,38,38,.03)}
.pb img{width:100%;height:100%;object-fit:contain;object-position:center;position:absolute;inset:0}
.ab{display:inline-flex;align-items:center;gap:4px;padding:7px 14px;border:1.5px dashed var(--bd);border-radius:7px;background:transparent;color:var(--mt);font-size:11px;font-weight:700;cursor:pointer;transition:all .2s;font-family:'Outfit',sans-serif}
.ab:hover{border-color:var(--ac);color:var(--ac);background:rgba(220,38,38,.05)}
.rb{width:28px;height:28px;border:none;background:#fee2e2;color:#dc2626;border-radius:7px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;transition:all .15s;flex-shrink:0}
.rb:hover{background:#dc2626;color:#fff}
.fb{width:32px;height:32px;border:1.5px solid var(--bd);border-radius:8px;background:var(--cd);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--fg);transition:all .15s}
.fb:hover{border-color:var(--ac);color:var(--ac)}
.a4{width:210mm;height:297mm;background:#fff;color:#000;box-shadow:0 10px 40px rgba(0,0,0,.12),0 2px 8px rgba(0,0,0,.06);position:relative;will-change:transform;border-radius:2px;overflow:hidden}
.tst{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(100px);background:#111;color:#fff;padding:12px 24px;border-radius:10px;font-size:13px;font-weight:600;box-shadow:0 8px 24px rgba(0,0,0,.25);z-index:9999;transition:transform .4s cubic-bezier(.4,0,.2,1);display:flex;align-items:center;gap:8px}
body.dark .tst{background:#f3f4f6;color:#111}
.tst.sh{transform:translateX(-50%) translateY(0)}
.mt{flex:1;padding:12px 8px;text-align:center;font-size:12px;font-weight:700;border:none;background:transparent;color:var(--mt);cursor:pointer;transition:all .2s;border-bottom:2.5px solid transparent;font-family:'Outfit',sans-serif}
.mt.on{color:var(--ac);border-bottom-color:var(--ac);background:rgba(220,38,38,.05)}
@keyframes fu{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fu{animation:fu .3s ease both}
.ph{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none;z-index:2;background:radial-gradient(ellipse at center,rgba(220,38,38,.04) 0%,transparent 65%)}
.rstb{background:none;border:1.5px solid #fecaca;color:#dc2626;padding:6px 14px;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer;transition:all .2s;font-family:'Outfit',sans-serif;display:inline-flex;align-items:center;gap:5px}
.rstb:hover{background:#fef2f2;border-color:#dc2626}
.mtgl{cursor:pointer;padding:8px;border-radius:50%;background:rgba(255,255,255,.1);color:#fff;transition:.2s}
.mtgl:hover{background:rgba(255,255,255,.2)}
.ctab{padding:8px 16px;border-radius:9999px;font-size:12px;font-weight:700;cursor:pointer;transition:all .25s cubic-bezier(.4,0,.2,1);border:1.5px solid transparent;font-family:'Outfit',sans-serif;white-space:nowrap}
.ctab.cv-a{background:#dc2626;color:#fff;border-color:#dc2626;box-shadow:0 2px 8px rgba(220,38,38,.25)}
.ctab.cv-i{background:transparent;color:#6b7280;border-color:#e5e7eb}
.ctab.cv-i:hover{border-color:#dc2626;color:#dc2626}
.ctab.sl-a{background:#fff;color:#111827;border-color:#d1d5db;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.ctab.sl-i{background:transparent;color:#6b7280;border-color:#e5e7eb}
.ctab.sl-i:hover{border-color:#9ca3af;color:#374151}
body.dark .ctab.cv-i{border-color:#374151;color:#9ca3af}
body.dark .ctab.cv-i:hover{border-color:#dc2626;color:#dc2626}
body.dark .ctab.sl-a{background:#1f2937;color:#f3f4f6;border-color:#4b5563;box-shadow:0 1px 4px rgba(0,0,0,.3)}
body.dark .ctab.sl-i{border-color:#374151;color:#9ca3af}
body.dark .ctab.sl-i:hover{border-color:#6b7280;color:#d1d5db}
.hdr-line{height:2px;background:linear-gradient(90deg,#dc2626 0%,#f97316 30%,#dc2626 60%,#991b1b 100%);background-size:300% 100%;animation:hdr-shimmer 4s ease-in-out infinite}
@keyframes hdr-shimmer{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
.a4-inner{transition:opacity .12s ease}
.ovfw{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);background:#dc2626;color:#fff;padding:6px 16px;border-radius:8px;font-size:10.5px;font-weight:700;z-index:10;display:flex;align-items:center;gap:6px;font-family:Outfit,sans-serif;box-shadow:0 4px 12px rgba(220,38,38,.35);pointer-events:none;white-space:nowrap;max-width:95%;text-align:center}
@media(prefers-reduced-motion:reduce){.hdr-line{animation:none}.fu{animation:none}.a4-inner{transition:none}.tc{transition:none}.ctab{transition:none}body::after{display:none}}
body.dark .rb{background:#3b1111}
body.dark .fb{background:#374151}
body.dark .rstb{border-color:#7f1d1d;color:#f87171}
body.dark .rstb:hover{background:#3b1111}
@media(max-width:640px){.tc{width:100px;padding:10px 6px}.tc .th{margin-bottom:6px}.tc h4{font-size:10px;line-height:1.2}.tc p{font-size:8.5px}.fi{padding:9px 12px;font-size:12px}.sh{padding:12px 0}.sh h3{font-size:12px}.pb{width:80px}.ctab{padding:7px 12px;font-size:11px}.ovfw{font-size:9px;padding:5px 10px;bottom:5px}}
@media(min-width:641px) and (max-width:1023px){.tc{width:108px}}

/* PDF Generation Container - Hidden from View */
#pdf-wrapper {
    position: fixed;
    top: 0;
    left: -9999px;
    width: 210mm;
    min-height: 297mm;
    background: #ffffff;
    color: #000000;
    z-index: -1000;
    overflow: hidden;
    box-sizing: border-box;
}
</style>
</head>
<body class="antialiased">

<header class="sticky top-0 z-50 shadow-lg border-b border-gray-800" style="background:var(--hd-bg);color:var(--hd-tx)">
<div class="max-w-[1740px] mx-auto flex items-center justify-between px-4 sm:px-5 py-3">
  <div class="flex items-center gap-2 sm:gap-3">
    <img src="https://z-cdn-media.chatglm.cn/files/4caaa295-54d9-406e-b564-a55ad59cdbcc.png?auth_key=1875686346-6607cd62573c471ca93896b196393843-0-187a6a334027bba6b12b7657ddb537ef" alt="Logo" class="h-8 sm:h-10 w-auto object-contain">
    <div class="flex items-center leading-none">
      <span class="text-white text-lg sm:text-2xl font-black tracking-tight">KARYA ABADI</span>
      <span class="text-white font-black ml-1" style="font-size:11px">.Jobs</span>
    </div>
  </div>
  <div class="flex items-center gap-2 sm:gap-3">
    <button onclick="toggleMode()" class="mtgl" aria-label="Ganti mode"><i id="modeIcon" class="fas fa-moon text-sm"></i></button>
    <button onclick="cfrmReset()" class="rstb hidden sm:inline-flex text-red-400 border-red-900 hover:bg-red-900/20" aria-label="Reset"><i class="fas fa-rotate-left"></i> Reset</button>
    <button onclick="dlPDF()" id="dlb" class="bg-red-600 hover:bg-red-700 text-white font-bold px-4 sm:px-5 py-2 sm:py-2.5 rounded-lg transition-all flex items-center gap-2 text-xs sm:text-sm shadow-md active:scale-95" aria-label="Download PDF"><i class="fas fa-download"></i><span class="hidden sm:inline">Download PDF</span></button>
  </div>
</div>
<div class="hdr-line"></div>
</header>

<section class="px-4 sm:px-5 py-3 border-b" style="background:var(--cd);border-color:var(--bd)">
<div class="max-w-[1740px] mx-auto">
  <div class="flex items-center gap-2 sm:gap-3 mb-3" id="catTabs"></div>
  <div class="flex gap-2 sm:gap-3 overflow-x-auto pb-1 -mx-1 px-1" id="tc" style="-webkit-overflow-scrolling:touch"></div>
</div>
</section>

<div class="flex lg:hidden border-b" style="background:var(--cd);border-color:var(--bd)">
  <button class="mt on" id="mf" onclick="smt('form')"><i class="fas fa-edit mr-1"></i>Formulir</button>
  <button class="mt" id="mp" onclick="smt('prev')"><i class="fas fa-eye mr-1"></i>Preview</button>
</div>

<div class="max-w-[1740px] mx-auto px-4 sm:px-5 py-4 flex flex-col lg:flex-row gap-4">
  <div id="fp" class="w-full lg:w-[400px] flex-shrink-0 lg:max-h-[calc(100vh-220px)] lg:overflow-y-auto">
    <div class="rounded-xl shadow-sm border overflow-hidden" id="fc" style="background:var(--cd);border-color:var(--bd)"></div>
  </div>
  <div id="pp" class="flex-1 hidden lg:block">
    <div class="rounded-xl p-3 sm:p-4 overflow-auto flex justify-center" id="psc" style="max-height:calc(100vh-220px);background:var(--bg)">
      <div id="psr" style="transform-origin:top center"></div>
    </div>
  </div>
</div>

<footer class="py-6 text-center text-xs font-medium" style="color:var(--mt);background:var(--bg);border-top:1px solid var(--bd)">
  <p>&copy; 2024 Karya Abadi. All rights reserved.</p>
</footer>

<div class="tst" id="tst"><i class="fas fa-check-circle" style="color:#22c55e"></i><span id="tsm"></span></div>

<div id="rstm" class="fixed inset-0 z-[999] flex items-center justify-center p-4 hidden">
  <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" onclick="document.getElementById('rstm').classList.add('hidden')"></div>
  <div class="relative bg-white dark:bg-gray-800 rounded-2xl shadow-2xl p-6 max-w-sm w-full fu text-center">
    <div class="w-12 h-12 bg-red-100 dark:bg-red-900/30 rounded-full flex items-center justify-center mx-auto mb-4"><i class="fas fa-exclamation-triangle text-red-600 text-xl"></i></div>
    <h3 class="text-lg font-bold mb-2 dark:text-white">Reset Semua Data?</h3>
    <p class="text-sm text-gray-500 dark:text-gray-400 mb-5">Semua data yang telah diisi akan dihapus permanen.</p>
    <div class="flex gap-3">
      <button onclick="document.getElementById('rstm').classList.add('hidden')" class="flex-1 py-2.5 rounded-xl border border-gray-200 dark:border-gray-600 text-sm font-bold hover:bg-gray-100 dark:hover:bg-gray-700 dark:text-white transition">Batal</button>
      <button onclick="doReset()" class="flex-1 py-2.5 rounded-xl bg-red-600 text-white text-sm font-bold hover:bg-red-700 transition">Ya, Reset</button>
    </div>
  </div>
</div>

<div id="pdf-wrapper"></div>

<script>
var DS={tpl:'cv01',foto:null,ff:'Times New Roman',sp:14,dp:{nama:'',ttl:'',jk:'',bangsa:'',agama:'',tb:'',bb:'',alamat:'',kec:'',hp:'',status:'',email:'',dusun:'',rtrw:'',desa:''},pr:{lulusan:'',jurusan:''},pd:[{n:'',tl:''},{n:'',tl:''},{n:'',tl:''}],px:[{pt:'',al:'',kp:'',jb:'',tm:'',ts:''}],hs:['','','','','','','',''],ss:['','','','','','',''],sr:{kota:'',tgl:'',lamp:'',npt:'',apt:'',apt2:'',sum:'',pos:'',ptk:'',fpl:'1'},lm:['','','']};
var S=JSON.parse(JSON.stringify(DS));
var _fitScale=1,_fitting=false,_activeCat='cv',_curPad=20,_cv3Pad=null,_svT=null,_rT=null;
var CATS=[{id:'cv',label:'CV',icon:'fa-file-lines'},{id:'sl',label:'Surat Melamar Pekerjaan',icon:'fa-envelope'}];
var TPL=[{id:'cv01',cat:'cv',nm:'CV Model 01',ds:'Klasik dengan foto',ic:'fa-id-card'},{id:'cv02',cat:'cv',nm:'CV Model 02',ds:'Modern minimalis',ic:'fa-user-tie'},{id:'cv03',cat:'cv',nm:'CV Model 03',ds:'Layout sidebar',ic:'fa-table-columns'},{id:'sl-os',cat:'sl',nm:'via Email (Posisi)',ds:'Lowongan spesifik',ic:'fa-envelope-open-text'},{id:'sl-ou',cat:'sl',nm:'via Email (Umum)',ds:'Tanpa posisi',ic:'fa-at'},{id:'sl-ts',cat:'sl',nm:'Tertulis (Posisi)',ds:'Tulis tangan spesifik',ic:'fa-pen-fancy'},{id:'sl-tu',cat:'sl',nm:'Tertulis (Umum)',ds:'Tulis tangan umum',ic:'fa-pen-nib'}];
function $(id){return document.getElementById(id)}
function saveLS(){clearTimeout(_svT);_svT=setTimeout(function(){try{localStorage.setItem('cvb_v52',JSON.stringify(S))}catch(e){}},500)}
function loadLS(){try{var d=JSON.parse(localStorage.getItem('cvb_v52'));if(d&&d.tpl){if(!d.sr)d.sr={};['pos','fpl'].forEach(function(k){if(d.sr[k]===undefined)d.sr[k]=k==='fpl'?'1':''});if(!d.dp)d.dp={};['rtrw','dusun','desa'].forEach(function(k){if(d.dp[k]===undefined)d.dp[k]=''});if(d.sp===undefined)d.sp=14;Object.assign(S,d);return true}}catch(e){}return false}
function V(x){return x||''}
function E(x){return(x||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function tplOf(id){return TPL.find(function(t){return t.id===id})}
function isCV(){return tplOf(S.tpl)?tplOf(S.tpl).cat==='cv':false}
function hasFt(){return['cv01','cv02','cv03'].indexOf(S.tpl)!==-1}
function isSp(){return S.tpl==='sl-os'||S.tpl==='sl-ts'}
function isTT(){return S.tpl==='sl-ts'||S.tpl==='sl-tu'}
function hasAny(){var d=S.dp;if(d.nama||d.ttl||d.email||d.hp||S.pr.lulusan)return true;if(S.pd.some(function(p){return p.n}))return true;if(S.px.some(function(p){return p.pt}))return true;if(S.sr.npt||S.sr.pos||S.sr.kota||S.sr.apt||S.sr.sum)return true;return false}
function toast(m){var t=$('tst');$('tsm').textContent=m;t.classList.add('sh');setTimeout(function(){t.classList.remove('sh')},2400)}
function smt(t){$('mf').classList.toggle('on',t==='form');$('mp').classList.toggle('on',t==='preview');$('fp').classList.toggle('hidden',t!=='form');$('pp').classList.toggle('hidden',t!=='preview');if(t==='preview')setTimeout(autoFit,80)}
function tgs(el){el.classList.toggle('cl');el.nextElementSibling.classList.toggle('cl')}
function adjSP(d){S.sp=Math.max(6,Math.min(28,S.sp+d));var i=$('spi');if(i)i.value=S.sp;_fitScale=1;rPV();saveLS()}
function cfrmReset(){$('rstm').classList.remove('hidden')}
function doReset(){S=JSON.parse(JSON.stringify(DS));_fitScale=1;_curPad=20;_cv3Pad=null;try{localStorage.removeItem('cvb_v52')}catch(e){}$('rstm').classList.add('hidden');_activeCat='cv';rTC();rF();rPV();toast('Semua data berhasil direset')}
function selT(id){S.tpl=id;_fitScale=1;_curPad=20;_cv3Pad=null;rTC();rF();rPV();saveLS()}
function toggleMode(){document.body.classList.toggle('dark');$('modeIcon').className=document.body.classList.contains('dark')?'fas fa-sun':'fas fa-moon';setTimeout(sclP,60)}
function rTC(){var isCVA=_activeCat==='cv';$('catTabs').innerHTML=CATS.map(function(c){var a=c.id===_activeCat;return'<button class="'+(c.id==='cv'?(a?'ctab cv-a':'ctab cv-i'):(a?'ctab sl-a':'ctab sl-i'))+'" onclick="swCat(\''+c.id+'\')"><i class="fas '+c.icon+' mr-1.5"></i>'+c.label+'</button>'}).join('');var items=TPL.filter(function(t){return t.cat===_activeCat});var onCls=isCVA?'on-red':'on-wh';var icC=isCVA?'text-red-600':'text-gray-700';$('tc').innerHTML=items.map(function(t){return'<div class="tc '+(t.id===S.tpl?onCls:'')+'" onclick="selT(\''+t.id+'\')" role="button" tabindex="0"><div class="th"><i class="fas '+t.ic+' text-2xl sm:text-3xl '+(t.id===S.tpl?icC:'text-gray-400')+'"></i></div><h4 class="font-bold text-[10px] sm:text-[11px] leading-tight dark:text-white">'+t.nm+'</h4><p class="text-[8.5px] sm:text-[9.5px] text-gray-400 mt-1">'+t.ds+'</p></div>'}).join('')}

/* ============================================================
   PDF ENGINE - ROBUST VERSION
   ============================================================ */
function dlPDF(){
    if(!hasAny()){toast('Isi minimal satu data terlebih dahulu');return}
    if(typeof html2pdf==='undefined'){
        toast('Memuat library PDF, tunggu sebentar...');
        var s=document.createElement('script');
        s.src='https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js';
        s.onload=function(){dlPDF()};
        s.onerror=function(){toast('Gagal memuat library PDF. Periksa koneksi internet.')};
        document.head.appendChild(s);
        return;
    }
    var btn=$('dlb');
    btn.disabled=true;
    btn.innerHTML='<i class="fas fa-spinner fa-spin"></i><span class="hidden sm:inline">Memproses...</span>';
    
    // Timeout to allow UI to update (show spinner)
    setTimeout(function(){
        (document.fonts?document.fonts.ready:Promise.resolve()).then(function(){
            try{processPDF(btn)}catch(e){console.error(e);resetBtn(btn);toast('Terjadi kesalahan sistem')}
        });
    },100);
}

function resetBtn(btn){
    btn.disabled=false;
    btn.innerHTML='<i class="fas fa-download"></i><span class="hidden sm:inline">Download PDF</span>';
}

function processPDF(btn){
    var wrapper = $('pdf-wrapper');
    var isCV3 = S.tpl === 'cv03';
    var nm = S.dp.nama || 'Dokumen';
    var tn = tplOf(S.tpl) ? tplOf(S.tpl).nm : 'Dokumen';
    var fn = (tn + '_' + nm).replace(/\s+/g, '_') + '.pdf';
    
    // Helper to generate HTML and fit it
    function renderAndFit(paddingVal, fontSizeVal) {
        // Temporarily set global font size variables
        var oldFS = FS, oldFSH = FSH;
        FS = fontSizeVal;
        FSH = fontSizeVal + 1;
        
        var html = '';
        if(S.tpl === 'cv01') html = gCV1();
        else if(S.tpl === 'cv02') html = gCV2();
        else if(isCV3) html = gCV3PDF(); // Use table version for CV03
        else html = gSL();
        
        wrapper.innerHTML = '<div style="padding:'+paddingVal+'mm;box-sizing:border-box;min-height:297mm;">' + html + '</div>';
        
        // Force reflow
        void wrapper.offsetHeight;
        
        var fits = wrapper.scrollHeight <= 1125; // 297mm approx 1123-1125px at 96dpi
        
        // Restore font size
        FS = oldFS; FSH = oldFSH;
        return fits;
    }

    // STRATEGY 1: Try current user settings (estimated)
    // Default padding 20mm, Font 12
    var ok = renderAndFit(20, 12);

    // STRATEGY 2: Reduce Padding
    if(!ok) {
        var pads = [15, 12, 10, 8, 5, 3];
        for(var i=0; i<pads.length; i++) {
            if(renderAndFit(pads[i], 12)) { ok = true; break; }
        }
    }

    // STRATEGY 3: Reduce Font and Padding
    if(!ok) {
        var fSizes = [11, 10.5, 10, 9.5, 9];
        for(var j=0; j<fSizes.length; j++) {
            // Corresponding padding gets smaller as font gets smaller
            var p = [12, 10, 8, 6, 4][j]; 
            if(renderAndFit(p, fSizes[j])) { ok = true; break; }
        }
    }
    
    // If still not ok, we proceed anyway with the smallest settings to minimize overflow
    if(!ok) {
        renderAndFit(3, 9);
    }

    // Generate PDF options
    var opt = {
        margin: 0,
        filename: fn,
        image: { type: 'jpeg', quality: 0.98 },
        html2canvas: { 
            scale: 2, // High res
            useCORS: true,
            logging: false,
            scrollY: 0,
            windowWidth: 794 // Force A4 width calculation
        },
        jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' },
        pagebreak: { mode: ['css', 'legacy'] }
    };

    // Save
    html2pdf().set(opt).from(wrapper).save().then(function(){
        resetBtn(btn);
        toast('PDF berhasil diunduh!');
    }).catch(function(err){
        console.error(err);
        resetBtn(btn);
        toast('Gagal mengunduh PDF');
    });
}

    sbH+=sbm('Alamat',al);
    sbH+=sbi('Jenis Kelamin',d.jk);sbH+=sbi('Bangsa',d.bangsa);sbH+=sbi('Agama',d.agama);
    sbH+=sbi('Tinggi Badan',d.tb?d.tb+' cm':'');sbH+=sbi('Berat Badan',d.bb?d.bb+' kg':'');
    sbH+=sbi('Status',d.status);sbH+=sbi('No. HP',d.hp);sbH+=sbi('Email',d.email);

    return'<table style="width:100%;border-collapse:collapse;'+a4s()+'"><tr>'+
