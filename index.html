function _bl2col(arr){
  var items=arr.filter(function(s){return s&&s.trim()});

  function bl(a){return a.map(function(s){return '<table style="width:100%;border-collapse:collapse;margin-bottom:0.3mm"><tr><td style="width:3mm;vertical-align:top;padding:0">\u2022</td><td style="vertical-align:top;padding:0;text-align:justify">'+esc(s.trim())+'</td></tr></table>'}).join('')}
  return '<table style="width:100%"><tr><td style="width:50%;vertical-align:top;padding:0.3mm 2mm 0.3mm 0">'+bl(col1)+'</td><td style="width:50%;vertical-align:top;padding:0.3mm 0">'+bl(col2)+'</td></tr></table>';

function skCV3single(hardSkills,softSkills){
