<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KARYA ABADI - CV Builder</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;900&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script>
tailwind.config={darkMode:'class',theme:{extend:{fontFamily:{dp:['Playfair Display','serif'],bd:['Outfit','sans-serif']}}}}
</script>
<style>
:root{--bg:#f3f4f6;--fg:#1f2937;--mt:#6b7280;--ac:#dc2626;--cd:#ffffff;--bd:#e5e7eb;--ib:#fff;--fi-bg:#fff;--fi-txt:#111;--hd-bg:#000;--hd-tx:#fff}
body.dark{--bg:#111827;--fg:#f3f4f6;--mt:#9ca3af;--cd:#1f2937;--bd:#374151;--ib:#1f2937;--fi-bg:#374151;--fi-txt:#f3f4f6;--hd-bg:#000;--hd-tx:#fff}
*{box-sizing:border-box;scrollbar-width:thin;scrollbar-color:var(--bd) transparent}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--fg);margin:0;transition:background .3s,color .3s}
.fi{width:100%;padding:10px 14px;border:1.5px solid var(--bd);border-radius:8px;background:var(--fi-bg);color:var(--fi-txt);font-family:'Outfit',sans-serif;font-size:13px;transition:border-color .2s,box-shadow .2s;outline:none}
.fi:focus{border-color:var(--ac);box-shadow:0 0 0 3px rgba(220,38,38,.1)}
.fi::placeholder{color:var(--mt)}
select.fi{cursor:pointer;appearance:auto}
.fl{display:block;font-size:11px;font-weight:700;color:var(--mt);margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
.sh{display:flex;align-items:center;justify-content:space-between;padding:14px 0;cursor:pointer;user-select:none;border-bottom:1px solid var(--bd)}
.sh h3{font-size:13px;font-weight:700;color:var(--fg);margin:0;display:flex;align-items:center;gap:8px}
.sh i.chv{font-size:10px;color:var(--mt);transition:transform .25s}
.sh.cl i.chv{transform:rotate(-90deg)}
.sb{overflow:hidden;transition:max-height .35s ease,opacity .25s;max-height:5000px;opacity:1;padding:12px 0}
.sb.cl{max-height:0;opacity:0;padding:0}
.tc{flex-shrink:0;width:110px;padding:12px 8px;background:#fff;border:2px solid transparent;border-radius:12px;cursor:pointer;transition:all .2s;box-shadow:0 2px 8px rgba(0,0,0,.06);text-align:center}
.tc:hover{box-shadow:0 6px 16px rgba(0,0,0,.1);transform:translateY(-3px)}
.tc.on{border-color:var(--ac);background:var(--bg)}
.tc .th{width:100%;aspect-ratio:1/1;background:var(--bg);border-radius:10px;display:flex;align-items:center;justify-content:center;margin-bottom:8px;transition:background .2s}
.tc.on .th{background:#fef2f2}
.pb{width:120px;aspect-ratio:2/3;border:2px dashed var(--bd);border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;transition:border-color .2s;background:var(--ib);position:relative}
.pb:hover{border-color:var(--ac)}
.pb img{width:100%;height:100%;object-fit:contain;position:absolute;inset:0}
.ab{display:inline-flex;align-items:center;gap:4px;padding:7px 14px;border:1.5px dashed var(--bd);border-radius:7px;background:transparent;color:var(--mt);font-size:11px;font-weight:700;cursor:pointer;transition:all .2s;font-family:'Outfit',sans-serif}
.ab:hover{border-color:var(--ac);color:var(--ac);background:rgba(220,38,38,.05)}
.rb{width:28px;height:28px;border:none;background:#fee2e2;color:#dc2626;border-radius:7px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;transition:all .15s;flex-shrink:0}
.rb:hover{background:#dc2626;color:#fff}
.fb{width:32px;height:32px;border:1.5px solid var(--bd);border-radius:8px;background:var(--cd);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--fg);transition:all .15s}
.fb:hover{border-color:var(--ac);color:var(--ac)}
.a4{width:210mm;background:#fff;color:#000;box-shadow:0 10px 30px rgba(0,0,0,.1);position:relative}
.tst{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--fg);color:var(--cd);padding:12px 24px;border-radius:8px;font-size:13px;font-weight:600;box-shadow:0 4px 12px rgba(0,0,0,.2);z-index:9999;transition:transform .4s cubic-bezier(.4,0,.2,1);display:flex;align-items:center;gap:8px}
.tst.sh{transform:translateX(-50%) translateY(0)}
.mt{flex:1;padding:12px 8px;text-align:center;font-size:12px;font-weight:700;border:none;background:transparent;color:var(--mt);cursor:pointer;transition:all .2s;border-bottom:2.5px solid transparent;font-family:'Outfit',sans-serif}
.mt.on{color:var(--ac);border-bottom-color:var(--ac);background:rgba(220,38,38,.05)}
@keyframes fu{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fu{animation:fu .3s ease both}
.ph{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#ccc;pointer-events:none}
.rstb{background:none;border:1.5px solid #fecaca;color:#dc2626;padding:6px 14px;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer;transition:all .2s;font-family:'Outfit',sans-serif;display:inline-flex;align-items:center;gap:5px}
.rstb:hover{background:#fef2f2;border-color:#dc2626}
.mtgl{cursor:pointer;padding:8px;border-radius:50%;background:rgba(255,255,255,.1);color:#fff;transition:.2s}
.mtgl:hover{background:rgba(255,255,255,.2)}
body.dark .tc{background:#1f2937;box-shadow:0 2px 8px rgba(0,0,0,.2)}
body.dark .tc.on{background:#111827}
body.dark .tc .th{background:#111827}
body.dark .tc.on .th{background:#1c0a0a}
body.dark .rb{background:#3b1111}
body.dark .fb{background:#374151}
body.dark .rstb{border-color:#7f1d1d;color:#f87171}
body.dark .rstb:hover{background:#3b1111}
@media(max-width:640px){.tc{width:96px;padding:10px 6px}.tc .th{margin-bottom:6px}.tc h4{font-size:10px}.tc p{font-size:8.5px}.fi{padding:9px 12px;font-size:12px}.sh{padding:12px 0}.sh h3{font-size:12px}.pb{width:100px}}
</style>
</head>
<body class="antialiased">

<header class="sticky top-0 z-50 shadow-lg border-b border-gray-800" style="background:var(--hd-bg);color:var(--hd-tx)">
<div class="max-w-[1740px] mx-auto flex items-center justify-between px-4 sm:px-5 py-3">
  <div class="flex items-center gap-2 sm:gap-3">
    <img src="https://z-cdn-media.chatglm.cn/files/4caaa295-54d9-406e-b564-a55ad59cdbcc.png?auth_key=1875686346-6607cd62573c471ca93896b196393843-0-187a6a334027bba6b12b7657ddb537ef" alt="Logo Karya Abadi" class="h-8 sm:h-10 w-auto object-contain">
    <div class="flex items-center leading-none">
      <span class="text-white text-lg sm:text-2xl font-black tracking-tight">KARYA ABADI</span>
      <span class="text-white font-black ml-1" style="font-size:11px">.Jobs</span>
    </div>
  </div>
  <div class="flex items-center gap-2 sm:gap-3">
    <button onclick="toggleMode()" class="mtgl" title="Ganti Mode" aria-label="Ganti mode gelap atau terang"><i id="modeIcon" class="fas fa-moon text-sm"></i></button>
    <button onclick="cfrmReset()" class="rstb hidden sm:inline-flex text-red-400 border-red-900 hover:bg-red-900/20" aria-label="Reset semua data"><i class="fas fa-rotate-left"></i> Reset</button>
    <button onclick="dlPDF()" id="dlb" class="bg-red-600 hover:bg-red-700 text-white font-bold px-4 sm:px-5 py-2 sm:py-2.5 rounded-lg transition-all flex items-center gap-2 text-xs sm:text-sm shadow-md active:scale-95" aria-label="Download PDF"><i class="fas fa-download"></i><span class="hidden sm:inline">Download PDF</span></button>
  </div>
</div>
</header>

<section class="px-4 sm:px-5 py-3 border-b" style="background:var(--cd);border-color:var(--bd)">
<div class="max-w-[1740px] mx-auto">
  <div class="flex items-center gap-2 mb-2.5">
    <span class="text-[10px] font-bold bg-black text-white px-2.5 py-0.5 rounded-full">CV</span>
    <span class="text-[10px] font-bold bg-red-600 text-white px-2.5 py-0.5 rounded-full">SURAT LAMARAN</span>
  </div>
  <div class="flex gap-2 sm:gap-3 overflow-x-auto pb-1 -mx-1 px-1" id="tc" style="-webkit-overflow-scrolling:touch"></div>
</div>
</section>

<div class="flex lg:hidden border-b" style="background:var(--cd);border-color:var(--bd)">
  <button class="mt on" id="mf" onclick="smt('form')"><i class="fas fa-edit mr-1"></i>Formulir</button>
  <button class="mt" id="mp" onclick="smt('prev')"><i class="fas fa-eye mr-1"></i>Preview</button>
</div>

<div class="max-w-[1740px] mx-auto px-4 sm:px-5 py-4 flex flex-col lg:flex-row gap-4">
  <div id="fp" class="w-full lg:w-[400px] flex-shrink-0 lg:max-h-[calc(100vh-220px)] lg:overflow-y-auto">
    <div class="rounded-xl shadow-sm border overflow-hidden" id="fc" style="background:var(--cd);border-color:var(--bd)"></div>
  </div>
  <div id="pp" class="flex-1 hidden lg:block">
    <div class="rounded-xl p-3 sm:p-4 overflow-auto flex justify-center" id="psc" style="max-height:calc(100vh-220px);background:var(--bg)">
      <div id="psr" style="transform-origin:top center"></div>
    </div>
  </div>
</div>

<footer class="py-6 text-center text-xs font-medium" style="color:var(--mt);background:var(--bg);border-top:1px solid var(--bd)">
  <p>&copy; 2024 Karya Abadi. All rights reserved.</p>
</footer>

<div class="tst" id="tst"><i class="fas fa-check-circle"></i><span id="tsm"></span></div>
<div id="pdr" style="position:absolute;left:-9999px;top:0"></div>

<div id="rstm" class="fixed inset-0 z-[999] flex items-center justify-center p-4 hidden">
  <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" onclick="document.getElementById('rstm').classList.add('hidden')"></div>
  <div class="relative bg-white dark:bg-gray-800 rounded-2xl shadow-2xl p-6 max-w-sm w-full fu text-center">
    <div class="w-12 h-12 bg-red-100 dark:bg-red-900/30 rounded-full flex items-center justify-center mx-auto mb-4"><i class="fas fa-exclamation-triangle text-red-600 text-xl"></i></div>
    <h3 class="text-lg font-bold mb-2 dark:text-white">Reset Semua Data?</h3>
    <p class="text-sm text-gray-500 dark:text-gray-400 mb-5">Semua data yang telah diisi akan dihapus permanen.</p>
    <div class="flex gap-3">
      <button onclick="document.getElementById('rstm').classList.add('hidden')" class="flex-1 py-2.5 rounded-xl border border-gray-200 dark:border-gray-600 text-sm font-bold hover:bg-gray-100 dark:hover:bg-gray-700 dark:text-white transition">Batal</button>
      <button onclick="doReset()" class="flex-1 py-2.5 rounded-xl bg-red-600 text-white text-sm font-bold hover:bg-red-700 transition">Ya, Reset</button>
    </div>
  </div>
</div>

<script>
const DS={tpl:'cv01',foto:null,ff:'Times New Roman',fs:11,dp:{nama:'',ttl:'',jk:'',bangsa:'',agama:'',tb:'',bb:'',alamat:'',kec:'',hp:'',status:'',email:'',dusun:'',rtrw:'',desa:''},pr:{lulusan:'',jurusan:''},pd:[{n:'',tl:''},{n:'',tl:''},{n:'',tl:''}],px:[{pt:'',al:'',kp:'',jb:'',tm:'',ts:''}],hs:['','','','','','','',''],ss:['','','','','','',''],sr:{kota:'',tgl:'',lamp:'',npt:'',apt:'',apt2:'',sum:'',pos:'',ptk:'',fpl:'1'},lm:['','','']};

let S=JSON.parse(JSON.stringify(DS));

const TPL=[
  {id:'cv01',tp:'cv',nm:'CV Model 01',ds:'Klasik dengan foto',ic:'fa-id-card'},
  {id:'cv02',tp:'cv',nm:'CV Model 02',ds:'Modern minimalis',ic:'fa-user-tie'},
  {id:'cv03',tp:'cv',nm:'CV Model 03',ds:'Layout sidebar',ic:'fa-columns'},
  {id:'sl-os',tp:'sl',nm:'Online Spesifik',ds:'Posisi tertentu',ic:'fa-envelope-open-text'},
  {id:'sl-ou',tp:'sl',nm:'Online Umum',ds:'Tanpa posisi',ic:'fa-envelope'},
  {id:'sl-ts',tp:'sl',nm:'Tulis Tangan Spesifik',ds:'Format tulis tangan',ic:'fa-pen-fancy'},
  {id:'sl-tu',tp:'sl',nm:'Tulis Tangan Umum',ds:'Tulis tangan umum',ic:'fa-pen'}
];

let _svT=null,_rT=null;

function saveLS(){clearTimeout(_svT);_svT=setTimeout(()=>{try{localStorage.setItem('cvb_v30',JSON.stringify(S))}catch(e){}},400)}

function loadLS(){
  try{
    const d=JSON.parse(localStorage.getItem('cvb_v30'));
    if(d&&d.tpl){
      if(!d.sr)d.sr={};if(d.sr.pos===undefined)d.sr.pos='';if(d.sr.fpl===undefined)d.sr.fpl='1';
      if(!d.dp)d.dp={};if(d.dp.rtrw===undefined)d.dp.rtrw='';if(d.dp.dusun===undefined)d.dp.dusun='';if(d.dp.desa===undefined)d.dp.desa='';
      Object.assign(S,d);return true;
    }
  }catch(e){}
  return false;
}

const V=x=>x||'';
const E=x=>(x||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const isCV=()=>TPL.find(t=>t.id===S.tpl)?.tp==='cv';
const hasFt=()=>['cv01','cv02','cv03'].includes(S.tpl);
const isSp=()=>S.tpl==='sl-os'||S.tpl==='sl-ts';
const isTT=()=>S.tpl==='sl-ts'||S.tpl==='sl-tu';

function hasAny(){
  const d=S.dp;
  if(d.nama||d.ttl||d.email||d.hp||S.pr.lulusan)return true;
  if(S.pd.some(p=>p.n)||S.px.some(p=>p.pt))return true;
  if(S.sr.npt||S.sr.pos||S.sr.kota||S.sr.apt||S.sr.sum)return true;
  return false;
}

function toast(m){const t=document.getElementById('tst');document.getElementById('tsm').textContent=m;t.classList.add('sh');setTimeout(()=>t.classList.remove('sh'),2400)}
function smt(t){document.getElementById('mf').classList.toggle('on',t==='form');document.getElementById('mp').classList.toggle('on',t==='prev');document.getElementById('fp').classList.toggle('hidden',t!=='form');document.getElementById('pp').classList.toggle('hidden',t!=='prev');if(t==='prev')setTimeout(sclP,80)}
function tgs(el){el.classList.toggle('cl');el.nextElementSibling.classList.toggle('cl')}
function adjFS(d){S.fs=Math.max(9,Math.min(16,Math.round((S.fs+d)*10)/10));const i=document.getElementById('fsi');if(i)i.value=S.fs;uP()}
function cfrmReset(){document.getElementById('rstm').classList.remove('hidden')}
function doReset(){S=JSON.parse(JSON.stringify(DS));try{localStorage.removeItem('cvb_v30')}catch(e){}document.getElementById('rstm').classList.add('hidden');rTC();rF();rPV();toast('Semua data berhasil direset')}
function selT(id){S.tpl=id;rTC();rF();rPV();saveLS()}
function toggleMode(){document.body.classList.toggle('dark');document.getElementById('modeIcon').className=document.body.classList.contains('dark')?'fas fa-sun':'fas fa-moon';setTimeout(sclP,60)}

function rTC(){
  document.getElementById('tc').innerHTML=TPL.map(t=>`
    <div class="tc ${t.id===S.tpl?'on':''}" onclick="selT('${t.id}')" role="button" tabindex="0" aria-label="Pilih ${t.nm}">
      <div class="th"><i class="fas ${t.ic} text-2xl sm:text-3xl text-red-600"></i></div>
      <h4 class="font-bold text-[10px] sm:text-[11px] leading-tight dark:text-white">${t.nm}</h4>
      <p class="text-[8.5px] sm:text-[9.5px] text-gray-400 mt-1">${t.ds}</p>
    </div>`).join('');
}

function rF(){
  const f=document.getElementById('fc');let h=rDS();
  if(hasFt())h+=rFS();
  h+=rDP();
  if(isCV())h+=rPR();
  if(isCV())h+=rPD();
  if(isCV())h+=rPX();
  if(isCV())h+=rKH();
  if(!isCV())h+=rSR();
  f.innerHTML=h;sclP();
}

function rDS(){
  return`<div class="p-4"><div class="sh" onclick="tgs(this)" role="button" tabindex="0" aria-expanded="true"><h3><i class="fas fa-cog text-red-600"></i>Pengaturan Tampilan</h3><i class="fas fa-chevron-down chv"></i></div><div class="sb"><div class="mb-3"><label class="fl">Jenis Font</label><select class="fi" onchange="S.ff=this.value;uP()">${['Times New Roman','Arial','Calibri','Cambria','Garamond'].map(f=>`<option ${S.ff===f?'selected':''}>${f}</option>`).join('')}</select></div><div class="mb-3"><label class="fl">Ukuran Font</label><div class="flex items-center gap-2"><button class="fb" onclick="adjFS(-0.5)" aria-label="Kurangi ukuran font">-</button><input type="number" id="fsi" class="fi text-center" style="width:72px;padding:6px" value="${S.fs}" min="9" max="16" step="0.5" onchange="S.fs=Math.max(9,Math.min(16,parseFloat(this.value)||11));this.value=S.fs;uP()"><button class="fb" onclick="adjFS(0.5)" aria-label="Tambah ukuran font">+</button><span class="text-[11px] text-gray-500 ml-1">pt</span></div></div></div></div>`;
}

function rFS(){
  const im=S.foto?`<img src="${S.foto}" alt="Pas foto">`:`<i class="fas fa-camera text-gray-400 text-lg mb-0.5"></i><span class="text-[9px] text-gray-400 font-medium">4x6 cm</span>`;
  return`<div class="px-4 pb-4 border-t" style="border-color:var(--bd)"><div class="sh" onclick="tgs(this)" role="button" tabindex="0" aria-expanded="true"><h3><i class="fas fa-image text-red-600"></i>Pas Foto</h3><i class="fas fa-chevron-down chv"></i></div><div class="sb"><div class="pb" onclick="document.getElementById('fi').click()">${im}<input type="file" id="fi" accept="image/*" hidden onchange="hFT(this)"></div><p class="text-[9.5px] mt-1.5" style="color:var(--mt)">Ukuran 4x6 cm, presisi tanpa terpotong</p>${S.foto?`<button class="rb mt-1.5" onclick="event.stopPropagation();rmFT()" aria-label="Hapus foto"><i class="fas fa-trash"></i></button>`:''}</div></div>`;
}

function rDP(){
  const d=S.dp;
  const r=(l,id,v,o)=>{
    if(o)return`<div class="mb-2.5"><label class="fl">${l}</label><select class="fi" onchange="S.dp.${id}=this.value;uP()">${o.map(x=>`<option ${v===x?'selected':''}>${x}</option>`).join('')}</select></div>`;
    return`<div class="mb-2.5"><label class="fl">${l}</label><input class="fi" value="${E(v)}" placeholder="..." oninput="S.dp.${id}=this.value;uP()"></div>`;
  };
  return`<div class="px-4 pb-4 border-t" style="border-color:var(--bd)"><div class="sh" onclick="tgs(this)" role="button" tabindex="0" aria-expanded="true"><h3><i class="fas fa-user text-red-600"></i>Data Pribadi</h3><i class="fas fa-chevron-down chv"></i></div><div class="sb">${r('Nama Lengkap','nama',d.nama)}${r('Tempat, Tanggal Lahir','ttl',d.ttl)}${r('Jenis Kelamin','jk',d.jk,['','Laki-laki','Perempuan'])}${r('Bangsa','bangsa',d.bangsa)}${r('Agama','agama',d.agama)}<div class="grid grid-cols-2 gap-2.5">${r('Tinggi Badan (cm)','tb',d.tb)}${r('Berat Badan (kg)','bb',d.bb)}</div>${r('Dusun','dusun',d.dusun)}${r('RT / RW','rtrw',d.rtrw)}${r('Desa / Kelurahan','desa',d.desa)}<div class="mb-2.5"><label class="fl">Jl. Alamat (Utama)</label><textarea class="fi" rows="2" placeholder="Jl. ..." oninput="S.dp.alamat=this.value;uP()">${V(d.alamat)}</textarea></div>${r('Kec. / Kab. / Kota','kec',d.kec)}<div class="grid grid-cols-2 gap-2.5">${r('No. HP','hp',d.hp)}${r('Status','status',d.status,['Belum Menikah','Menikah'])}</div>${r('Email','email',d.email)}</div></div>`;
}

function rPR(){const p=S.pr;return`<div class="px-4 pb-4 border-t" style="border-color:var(--bd)"><div class="sh" onclick="tgs(this)" role="button" tabindex="0" aria-expanded="true"><h3><i class="fas fa-align-left text-red-600"></i>Profil</h3><i class="fas fa-chevron-down chv"></i></div><div class="sb"><div class="mb-2.5"><label class="fl">Lulusan</label><input class="fi" value="${E(p.lulusan)}" placeholder="S1, D3, SMK..." oninput="S.pr.lulusan=this.value;uP()"></div><div class="mb-2.5"><label class="fl">Jurusan</label><input class="fi" value="${E(p.jurusan)}" placeholder="Nama jurusan" oninput="S.pr.jurusan=this.value;uP()"></div></div></div>`}

function rPD(){
  let rw=S.pd.map((p,i)=>`<div class="p-3 rounded-lg mb-2 fu" style="background:var(--bg)"><div class="flex items-center justify-between mb-2"><span class="text-[10px] font-bold text-red-600">Pendidikan ${i+1}</span><button class="rb" onclick="S.pd.splice(${i},1);rF();uP()" aria-label="Hapus pendidikan ${i+1}"><i class="fas fa-times"></i></button></div><div class="mb-2"><label class="fl">Nama Sekolah</label><input class="fi" value="${E(p.n)}" placeholder="..." oninput="S.pd[${i}].n=this.value;uP()"></div><div><label class="fl">Tahun Lulus</label><input class="fi" value="${E(p.tl)}" placeholder="0000/0000" oninput="S.pd[${i}].tl=this.value;uP()"></div></div>`).join('');

function uP(){clearTimeout(_rT);_rT=setTimeout(()=>{const c=document.getElementById('psc');if(!c)return;const st=c.scrollTop;rPV();c.scrollTop=st;saveLS()},80)}

function rPV(){
  const sc=document.getElementById('psr');let h='';
  if(S.tpl==='cv01')h=gCV1();else if(S.tpl==='cv02')h=gCV2();else if(S.tpl==='cv03')h=gCV3();else h=gSL();
  const emp=!hasAny();
  sc.innerHTML=`<div class="a4" id="a4p">${h}${emp?`<div class="ph"><i class="fas fa-keyboard text-4xl mb-3"></i><p style="font-size:14px;font-weight:600;margin:0">Mulai isi formulir di sebelah kiri</p><p style="font-size:11px;margin:4px 0 0;color:#bbb">Preview akan otomatis diperbarui</p></div>`:''}</div>`;
  setTimeout(sclP,40);

function sclP(){
  const c=document.getElementById('psc'),p=document.getElementById('a4p');
  if(!p||!c)return;const cw=c.clientWidth-24;
  p.style.transform='none';
  const pw=p.offsetWidth,ph=p.offsetHeight;
  if(!pw)return;
  const s=Math.min(1,cw/pw);
  p.style.transform=`scale(${s})`;p.style.transformOrigin='top center';
  const sc=document.getElementById('psr');
  sc.style.width=pw+'px';sc.style.height=Math.ceil(ph*s)+'px';
}

function prT(){const l=V(S.pr.lulusan),j=V(S.pr.jurusan);if(!l&&!j)return'';return`Saya lulusan ${l} dengan latar belakang jurusan ${j}. Berbekal fondasi akademis dan semangat untuk terus belajar, saya siap memberikan kontribusi positif dalam lingkungan kerja serta antusias dalam mengembangkan keterampilan baru untuk mencapai tujuan Perusahaan.`;}

function prPN(txt){return`<p style="text-align:justify;text-justify:inter-word;word-spacing:-0.06em;margin:0 0 4px">${txt}</p>`;}
function ftMM(){if(!S.foto)return'';return`<img src="${S.foto}" style="width:40mm;height:60mm;object-fit:contain;border:1px solid #ccc;border-radius:2px;">`}

const C1W='42%',C2W='30%',C3W='28%';

function pdC3(){const it=S.pd.filter(p=>p.n||p.tl);if(!it.length)return'';return`${sT('PENDIDIKAN')}<table style="width:100%;border-collapse:collapse;border-spacing:0">${it.map(p=>`<tr><td style="padding:3px 6px 3px 0;text-align:left;width:${C1W}">${E(p.n)}</td><td style="padding:3px 6px;text-align:left;width:${C2W}">Lulus Tahun</td><td style="padding:3px 0 3px 6px;text-align:left;width:${C3W}">${E(p.tl)}</td></tr>`).join('')}</table>`}

function khC3(){const h=S.hs.filter(x=>x),s=S.ss.filter(x=>x);if(!h.length&&!s.length)return'';let html=`${sT('KEAHLIAN')}<table style="width:100%;border-collapse:collapse;border-spacing:0">`;function blk(label,arr){const mid=Math.ceil(arr.length/2),lm=arr.slice(0,mid),rt=arr.slice(mid),rows=Math.max(lm.length,rt.length,1);html+=`<tr><td rowspan="${rows}" style="padding:3px 8px 3px 0;vertical-align:top;text-align:left;width:${C1W};font-weight:bold">${label}</td><td style="padding:3px 6px;vertical-align:top;text-align:left;width:${C2W}">${lm[0]?`&bull; ${E(lm[0])}`:''}</td><td style="padding:3px 0 3px 6px;vertical-align:top;text-align:left;width:${C3W}">${rt[0]?`&bull; ${E(rt[0])}`:''}</td></tr>`;for(let i=1;i<rows;i++)html+=`<tr><td style="padding:3px 6px;vertical-align:top;text-align:left">${lm[i]?`&bull; ${E(lm[i])}`:''}</td><td style="padding:3px 0 3px 6px;vertical-align:top;text-align:left">${rt[i]?`&bull; ${E(rt[i])}`:''}</td></tr>`;}if(h.length)blk('Hard Skill',h);if(h.length&&s.length)html+=`<tr><td colspan="3" style="height:1em"></td></tr>`;if(s.length)blk('Soft Skill',s);html+=`</table>`;return html}
function pdC2Y(){const it=S.pd.filter(p=>p.n||p.tl);if(!it.length)return'';return`${sT('PENDIDIKAN')}<table style="width:100%;border-collapse:collapse;border-spacing:0">${it.map(p=>`<tr><td style="padding:3px 12px 3px 0;text-align:left;width:60%">${E(p.n)}</td><td style="padding:3px 0;text-align:right;width:40%">${E(p.tl)}</td></tr>`).join('')}</table>`}
function pxC3R(){const it=S.px.filter(p=>p.pt||p.jb);if(!it.length)return'';return`${sT('PENGALAMAN')}<table style="width:100%;border-collapse:collapse;border-spacing:0">${it.map(p=>{const period=E(p.tm)+(p.ts?` - ${E(p.ts)}`:'');return`<tr><td style="padding:3px 12px 3px 0;vertical-align:top;width:65%">${E(p.jb)}</td><td style="padding:3px 0;vertical-align:top;white-space:nowrap;width:35%">${period}</td></tr><tr><td style="padding:0 12px 0 0">${E(p.pt)}</td><td></td></tr><tr><td style="padding:3px 12px 3px 0">${E(p.kp)}</td><td></td></tr>`}).join('')}</table>`}
function khC1R(){const h=S.hs.filter(x=>x),s=S.ss.filter(x=>x);if(!h.length&&!s.length)return'';let html=`${sT('KEAHLIAN')}`;if(h.length){html+=`<div style="font-weight:bold">Hard Skill</div>`;h.forEach(x=>{html+=`<div style="padding-left:.75em">&bull; ${E(x)}</div>`})}if(h.length&&s.length)html+=`<div style="height:1em"></div>`;if(s.length){html+=`<div style="font-weight:bold">Soft Skill</div>`;s.forEach(x=>{html+=`<div style="padding-left:.75em">&bull; ${E(x)}</div>`})}return html}

  const d=S.dp,pt=prT();let info='';

/* === CV 03 — FIX: Alamat sidebar pakai <div> terpisah dengan display:block eksplisit === */
function gCV3(){
  const d=S.dp,pt=prT();let html='';
  if(S.foto)html+=`<div style="text-align:center;margin-bottom:3em">${ftMM()}</div>`;
  if(d.ttl)html+=`<div style="margin-bottom:2em"><div style="font-weight:bold">Tempat, Tanggal Lahir</div><div>${E(d.ttl)}</div></div>`;

  /* Alamat — setiap baris = <div> sendiri dengan display:block eksplisit,
     dipisahkan dari container parent flex agar tidak saling menempel */
  const almLines=[];
  if(d.dusun) almLines.push(E(d.dusun));
  if(d.rtrw) almLines.push(E(d.rtrw));
  if(d.desa) almLines.push(E(d.desa));
  /* Pisahkan kec per koma, trim spasi di awal/akhir saja, biarkan spasi tengah utuh */
  if(d.kec){
    d.kec.split(',').forEach(function(part){
      var trimmed = part.replace(/^\s+|\s+$/g, '');
      if(trimmed) almLines.push(E(trimmed));
    });
  }
  if(almLines.length){
    html+=`<div style="margin-bottom:2em"><div style="font-weight:bold">Alamat</div>`;
    for(var ai=0;ai<almLines.length;ai++){
      html+=`<div style="display:block;clear:both">${almLines[ai]}</div>`;
    }
    html+=`</div>`;
  }

  const od=[['Jenis Kelamin',d.jk],['Bangsa',d.bangsa],['Agama',d.agama],['Tinggi Badan',d.tb?d.tb+' cm':''],['Berat Badan',d.bb?d.bb+' kg':''],['Status',d.status],['No. HP',d.hp],['Email',d.email]].filter(x=>x[1]);
  html+=od.map(x=>`<div style="margin-bottom:2em"><div style="font-weight:bold">${x[0]}</div><div>${E(x[1])}</div></div>`).join('');

  /* Sidebar: flex-shrink:0 mencegah kompresi, display:block memastikan flow normal */
  return`<div style="${a4s()}display:flex"><div style="width:35%;flex-shrink:0;display:block;background:#f0f0f0;padding:20mm 11mm;border-right:2.5px solid #000;box-sizing:border-box">${html}</div><div style="width:65%;padding:20mm 16mm"><div style="font-size:${S.fs+5}pt;font-weight:bold;text-transform:uppercase;letter-spacing:2px;margin-bottom:8px;padding-bottom:6px;border-bottom:2px solid #000">${E(d.nama)}</div>${pt?prPN(pt):''}${pdC2Y()}${pxC3R()}${khC1R()}</div></div>`;
}

function gSL(){
  const d=S.dp,s=S.sr,sp=isSp(),tt=isTT();
  const op=sp?`Sesuai dengan informasi adanya lowongan pekerjaan di PT. ${E(s.npt)} yang saya peroleh dari ${E(s.sum)}, saya bermaksud untuk melamar pekerjaan sebagai ${E(s.pos)}.`:`Sesuai dengan informasi adanya lowongan pekerjaan di PT. ${E(s.npt)} yang saya peroleh dari ${E(s.sum)}, saya bermaksud untuk melamar pekerjaan di Perusahaan yang Bapak/Ibu ${tt?'Pimpin':'pimpin'}.`;
  const dpList=[['Nama',d.nama],['Tempat dan Tanggal Lahir',d.ttl],['Jenis Kelamin',d.jk],['Agama',d.agama],['Status',d.status],['Pendidikan Terakhir',s.ptk]];
  let dpH='';dpList.forEach(r=>{if(r[1])dpH+=`<tr><td style="padding:1px 14px 1px 0;white-space:nowrap;text-align:left">${r[0]}</td><td style="padding:1px 4px 1px 0;white-space:nowrap">:</td><td style="padding:1px 0">${E(r[1])}</td></tr>`});
  if(d.alamat||d.kec){dpH+=`<tr><td style="padding:1px 14px 1px 0;white-space:nowrap;text-align:left">Alamat</td><td style="padding:1px 4px 1px 0;white-space:nowrap">:</td><td style="padding:1px 0">${E(d.alamat)}</td></tr>`;if(d.kec)dpH+=`<tr><td colspan="2" style="padding:0"></td><td style="padding:1px 0">${E(d.kec)}</td></tr>`;}
  if(d.email)dpH+=`<tr><td style="padding:1px 14px 1px 0;white-space:nowrap;text-align:left">Email</td><td style="padding:1px 4px 1px 0;white-space:nowrap">:</td><td style="padding:1px 0">${E(d.email)}</td></tr>`;
  if(d.hp)dpH+=`<tr><td style="padding:1px 14px 1px 0;white-space:nowrap;text-align:left">No HP</td><td style="padding:1px 4px 1px 0;white-space:nowrap">:</td><td style="padding:1px 0">${E(d.hp)}</td></tr>`;
  let items=[];if(tt){items.push('CV / Daftar Riwayat Hidup');items.push(`Pas Foto terbaru (${parseInt(s.fpl)||1} Lembar)`);}
  const pfx=tt?'Fotokopi':'Scan';S.lm.filter(x=>x).forEach(x=>items.push(`${pfx} ${E(x)}`));
  const tl=items.length,lh=items.map((l,i)=>`<div style="padding:1px 0">${i+1}. ${l}</div>`).join('');
  const aptL=[s.apt,s.apt2].filter(Boolean);
  return`<div style="${a4s()}padding:20mm"><div style="text-align:right;margin-bottom:18px">${E(s.kota)}, ${E(s.tgl)}</div><table style="width:auto;border-collapse:collapse;border-spacing:0;margin:0"><tr><td style="padding:1px 14px 1px 0;white-space:nowrap;text-align:left">Hal</td><td style="padding:1px 4px 1px 0;white-space:nowrap">:</td><td style="padding:1px 0">Lamaran Pekerjaan</td></tr><tr><td style="padding:1px 14px 1px 0;white-space:nowrap;text-align:left">Lampiran</td><td style="padding:1px 4px 1px 0;white-space:nowrap">:</td><td style="padding:1px 0">${tl} lembar</td></tr></table><div style="margin:14px 0 0 0">Kepada Yth,</div><div style="margin-bottom:12px"><div>Bapak/Ibu HRD</div><div>PT. ${E(s.npt)}</div>${aptL[0]?`<div>${E(aptL[0])}</div>`:''}${aptL[1]?`<div>${E(aptL[1])}</div>`:''}</div><div style="margin-bottom:10px">Dengan hormat,</div><p style="text-align:justify;margin-bottom:10px">${op}</p><div style="margin-bottom:10px">Saya yang bertanda tangan di bawah ini:</div><table style="width:auto;border-collapse:collapse;border-spacing:0">${dpH}</table><div style="margin:12px 0">Sebagai bahan pertimbangan bagi Bapak/Ibu bersama surat ini turut saya lampirkan:</div><div style="margin-bottom:14px">${lh}</div><p style="text-align:justify;margin-bottom:22px">Demikian surat lamaran pekerjaan ini saya buat dengan sebenarnya dan besar harapan saya untuk bergabung dengan perusahaan yang Bapak/Ibu pimpin. Atas perhatian dan kebijaksanaan Bapak/Ibu pimpinan, saya ucapkan terima kasih.</p><div style="text-align:right"><div>Hormat saya,</div><div style="height:55px"></div><div style="font-weight:bold">${E(d.nama)}</div></div></div>`;
}

function dlPDF(){
  if(!hasAny()){toast('Isi minimal satu data terlebih dahulu');return;}
  const b=document.getElementById('dlb');b.disabled=true;b.innerHTML='<i class="fas fa-spinner fa-spin"></i><span class="hidden sm:inline">Memproses...</span>';
  const pg=document.getElementById('a4p');
  if(!pg){b.disabled=false;b.innerHTML='<i class="fas fa-download"></i><span class="hidden sm:inline">Download PDF</span>';return;}
  const cl=pg.cloneNode(true);
  cl.style.transform='none';cl.style.overflow='visible';cl.style.boxShadow='none';cl.style.width='210mm';
  const ph=cl.querySelector('.ph');if(ph)ph.remove();
  const rd=document.getElementById('pdr');rd.innerHTML='';rd.appendChild(cl);
  void cl.offsetWidth;
  const nm=S.dp.nama||'Dokumen',tn=TPL.find(t=>t.id===S.tpl)?.nm||'Dokumen';
  const fn=`${tn}_${nm}.pdf`.replace(/\s+/g,'_');
  setTimeout(()=>{
    html2pdf().set({margin:0,filename:fn,image:{type:'jpeg',quality:.98},html2canvas:{scale:2,useCORS:true,backgroundColor:'#ffffff'},jsPDF:{unit:'mm',format:'a4',orientation:'portrait'},pagebreak:{mode:'legacy'}}).from(cl).save().then(()=>{rd.innerHTML='';b.disabled=false;b.innerHTML='<i class="fas fa-download"></i><span class="hidden sm:inline">Download PDF</span>';toast('PDF berhasil diunduh!');}).catch(()=>{rd.innerHTML='';b.disabled=false;b.innerHTML='<i class="fas fa-download"></i><span class="hidden sm:inline">Download PDF</span>';toast('Gagal mengunduh PDF');});
  },300);
}
