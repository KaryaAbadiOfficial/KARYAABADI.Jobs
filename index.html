function scaleInlinePreview(){
  var w=document.getElementById('preview-wrap'),s=document.getElementById('a4-scaler');
  if(!w||!s)return;
  var a4w=794,a4h=1123;
  var ww=w.clientWidth-20;
  if(pvFull){
    var scale=Math.min(1,ww/a4w);
    s.style.transform='';s.style.transformOrigin='top left';
    s.style.width=Math.round(a4w*scale)+'px';
    s.style.height=Math.round(a4h*scale)+'px';
    s.style.zoom=scale;
  }else{
    var scale=Math.min(1,ww/a4w);
    s.style.transform='';s.style.transformOrigin='top left';
    s.style.zoom=scale;
    s.style.width=Math.round(a4w*scale)+'px';
    s.style.height=Math.round(a4h*scale)+'px';
  }
}

  var autoPembuka='Sesuai dengan informasi adanya lowongan pekerjaan di '+esc(PT)+' yang saya peroleh dari '+esc(SUM)+', '+autoLt+'.';
  var customPembuka=v('sPembuka')&&v('sPembuka').trim();var pembukaText=customPembuka?esc(customPembuka):autoPembuka;
  var autoPenutup='Demikian surat lamaran pekerjaan ini saya buat dengan sebenarnya dan besar harapan saya untuk bergabung dengan perusahaan yang Bapak/Ibu pimpin. Atas perhatian dan kebijaksanaan Bapak/Ibu pimpinan, saya ucapkan terima kasih.';
  var customPenutup=v('sPenutup')&&v('sPenutup').trim();var penutupText=customPenutup?esc(customPenutup):autoPenutup;
  var li=[];if(m.on){for(var i=0;i<lampList.length;i++){var val=lampList[i]&&lampList[i].trim();if(!val)continue;li.push('Scan '+val)}}else{li.push('CV/Daftar Riwayat Hidup');var pfVal=lampList[1]&&lampList[1].trim();li.push(pfVal?'Pas Foto '+pfVal:'Pas Foto');for(var i=2;i<lampList.length;i++){var val=lampList[i]&&lampList[i].trim();if(!val)continue;li.push('Fotokopi '+val)}}
  var lamps=li.length?li.map(function(item,idx){return'<div>'+(idx+1)+'. '+esc(item)+'</div>'}).join(''):'<div>………………………..</div>';
  var lampLabel=m.on?'Data scan':'lembar';
  var labelStyle='padding-right:3mm;white-space:nowrap;text-align:left;';
  var colonStyle='width:5mm;text-align:center;';
  function dr(l,val){return'<tr><td style="'+labelStyle+'">'+l+'</td><td style="'+colonStyle+'">:</td><td style="padding-top:.5mm;text-align:left">'+val+'</td></tr>'}
  var al2r=AL2?'<tr><td style="'+labelStyle+'">&nbsp;</td><td style="'+colonStyle+'">&nbsp;</td><td style="padding-top:.5mm;text-align:left">'+esc(AL2)+'</td></tr>':'';
  var h='<div style="text-align:right;margin-bottom:8mm">'+esc(sK)+', '+esc(sT)+' '+esc(sBT)+'</div>';
  h+='<div style="margin-bottom:8mm">Kepada Yth.<br><strong>'+esc(PT)+'</strong><br>'+esc(JL)+(JL2?'<br>'+esc(JL2):'')+'</div>';
  if(m.pos){h+='<div style="text-align:center;font-weight:700;text-decoration:underline;margin-bottom:2mm">LAMARAN PEKERJAAN</div>';h+='<div style="text-align:center;margin-bottom:8mm">Sebagai '+esc(POS)+'</div>'}else{h+='<div style="text-align:center;font-weight:700;text-decoration:underline;margin-bottom:8mm">LAMARAN PEKERJAAN</div>'}

  h+='<div style="text-align:justify;margin-top:5mm;margin-bottom:5mm">'+penutupText+'</div>';

function renderPreview(){
  var html='';
  if(curCat==='cv'){if(curTpl==='cv1')html=renderCV1();else if(curTpl==='cv2')html=renderCV2();else if(curTpl==='cv3')html=renderCV3();}
  else{html=renderSuratP()}
  var p1=document.getElementById('a4-page');var p2=document.getElementById('a4-page-mob');
  if(p1)p1.innerHTML=html;if(p2)p2.innerHTML=html;
  applyPageStyle();scaleInlinePreview();
}

function downloadPDF(){
  var el=document.getElementById('a4-page');var offscreen=document.getElementById('pdf-offscreen');
  offscreen.innerHTML=el.outerHTML;var clone=offscreen.firstElementChild;
  clone.style.cssText='width:210mm;height:297mm;padding:12mm 16mm;font-family:'+selFont+';font-size:'+selSize+'pt;line-height:'+selLH+';background:#fff;color:#000;overflow:hidden;';
  clone.innerHTML=el.innerHTML;
  var opt={margin:0,filename:(curCat==='cv'?'CV_':'Surat_Lamaran_')+(v('nama')||'dokumen')+'.pdf',image:{type:'jpeg',quality:0.98},html2canvas:{scale:2,useCORS:true},jsPDF:{unit:'mm',format:'a4',orientation:'portrait'}};
  toast('Membuat PDF...','info');
  html2pdf().set(opt).from(clone).save().then(function(){toast('PDF berhasil diunduh!','success');offscreen.innerHTML=''}).catch(function(){toast('Gagal membuat PDF','error');offscreen.innerHTML=''});
}

function resetForm(){
  if(!confirm('Reset semua data formulir?'))return;
  document.querySelectorAll('#form-panel .fi').forEach(function(el){el.value=''});
  eduList=[{t:'',n:'',y:''},{t:'',n:'',y:''},{t:'',n:'',y:''},{t:'',n:'',y:''},{t:'',n:'',y:''}];
  eduNonList=[{t:'',y:''}];expList=[{j:'',m:'',pt:'',jl:'',kt:'',desc:''}];
  hSkills=['','','','','',''];sSkills=['','','','','',''];kSkills=['','','','','',''];
  lampList=['',''];photoData=null;
  var img=document.getElementById('photo-thumb');if(img){img.src='';img.classList.add('hidden')}
  var ph=document.getElementById('photo-ph');if(ph)ph.classList.remove('hidden');
  savedCV={};savedSurat={};renderForm();renderPreview();toast('Formulir berhasil direset','info');
}

function handlePhoto(e){
  var file=e.target.files[0];if(!file)return;
  if(file.size>2*1024*1024){toast('Ukuran file maks 2MB','error');return}
  var reader=new FileReader();
  reader.onload=function(ev){photoData=ev.target.result;var img=document.getElementById('photo-thumb');if(img){img.src=photoData;img.classList.remove('hidden')}var ph=document.getElementById('photo-ph');if(ph)ph.classList.add('hidden');renderPreview()};
  reader.readAsDataURL(file);
}

function toggleDark(){document.documentElement.classList.toggle('dark')}

});

  if(!document.getElementById('preview-mobile').classList.contains('hidden')){
    var w=document.getElementById('preview-wrap-mob'),p=document.getElementById('a4-page-mob'),s=document.getElementById('a4-scaler-mob');
    if(w&&p&&s){var pw=p.offsetWidth,ww=w.clientWidth-24;if(pw&&ww)s.style.zoom=Math.min(1,ww/pw)}
  }
});
