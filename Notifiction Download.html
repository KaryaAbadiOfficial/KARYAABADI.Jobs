<!-- NOTIFIKASI TOP -->
<div id="topNotif">
  <span class="notif-icon"></span>
  <span class="notif-text">
    Hasil Download Pdf<br>
    Cek di File Manager
  </span>
  <span class="notif-close" onclick="closeNotif()">✖</span>
</div>

<style>
#topNotif {
  position: fixed;
  top: -120px;
  left: 50%;
  transform: translateX(-50%);
  width: auto;
  max-width: 90%;
  background: #d32f2f;
  color: #fff;
  font-weight: bold;
  text-align: center;
  padding: 12px 45px 12px 20px;
  font-size: 16px;
  z-index: 9999;
  box-shadow: 0 3px 8px rgba(0,0,0,0.3);
  transition: top 0.5s ease;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 0 0 10px 10px;
}

.notif-icon {
  margin-right: 8px;
  font-size: 18px;
}

.notif-text {
  text-align: center;
  line-height: 1.3;
}

.notif-close {
  position: absolute;
  right: 12px;
  cursor: pointer;
  font-size: 16px;
}
</style>

<script>
function showNotif() {
  var notif = document.getElementById("topNotif");
  notif.style.top = "0";

  setTimeout(function() {
    notif.style.top = "-120px";
  }, 5000);
}

function closeNotif() {
  document.getElementById("topNotif").style.top = "-120px";
}

setTimeout(showNotif, 1000);
setInterval(showNotif, 10000);
</script>
